# Cargo configuration for Alexandria
#
# CMAKE_POLICY_VERSION_MINIMUM: Required because audiopus_sys bundles an
# older Opus CMakeLists.txt that uses cmake_minimum_required(VERSION 3.1)
# which is incompatible with CMake 4.x.
[env]
CMAKE_POLICY_VERSION_MINIMUM = "3.5"

# Android: use API 28+ (Android 9 Pie) for AAudio support (required by cpal).
# This tells the NDK clang to link against API 28 sysroot.
[target.aarch64-linux-android]
linker = "/Users/hack/Library/Android/sdk/ndk/26.3.11579264/toolchains/llvm/prebuilt/darwin-x86_64/bin/aarch64-linux-android28-clang"

[target.armv7-linux-androideabi]
linker = "/Users/hack/Library/Android/sdk/ndk/26.3.11579264/toolchains/llvm/prebuilt/darwin-x86_64/bin/armv7a-linux-androideabi28-clang"
