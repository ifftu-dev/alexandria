<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Music Instrument Trainer</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui,
          sans-serif;
      }
      body {
        margin: 0;
        padding: 24px;
        background: transparent;
        color: inherit;
      }
      .target {
        text-align: center;
        margin-bottom: 24px;
      }
      .note {
        font-size: 64px;
        font-weight: 700;
        line-height: 1;
        margin: 0;
      }
      .label {
        margin-top: 8px;
        font-size: 13px;
        color: color-mix(in srgb, currentColor 60%, transparent);
      }
      .meter-wrap {
        margin: 24px auto 0;
        max-width: 320px;
      }
      .meter {
        height: 16px;
        border-radius: 8px;
        background: color-mix(in srgb, currentColor 10%, transparent);
        overflow: hidden;
        position: relative;
      }
      .meter-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #16a34a, #22c55e);
        transition: width 60ms linear;
      }
      .meter-readout {
        margin-top: 6px;
        font-size: 12px;
        color: color-mix(in srgb, currentColor 60%, transparent);
        text-align: center;
      }
      .actions {
        margin-top: 24px;
        display: flex;
        justify-content: center;
        gap: 8px;
      }
      button {
        font: inherit;
        padding: 8px 16px;
        border-radius: 8px;
        border: 1px solid color-mix(in srgb, currentColor 30%, transparent);
        background: color-mix(in srgb, currentColor 10%, transparent);
        color: inherit;
        cursor: pointer;
      }
      button.primary {
        background: color-mix(in srgb, currentColor 80%, transparent);
        color: color-mix(in srgb, currentColor 10%, white);
      }
      button[disabled] { opacity: 0.5; cursor: not-allowed; }
      .status {
        margin-top: 16px;
        text-align: center;
        font-size: 13px;
        color: color-mix(in srgb, currentColor 70%, transparent);
      }
    </style>
  </head>
  <body>
    <div class="target">
      <p class="note" id="note">A4</p>
      <p class="label">Play this note on your instrument</p>
    </div>

    <div class="meter-wrap">
      <div class="meter">
        <div id="meter-fill" class="meter-fill"></div>
      </div>
      <div id="meter-readout" class="meter-readout">Microphone access not granted</div>
    </div>

    <div class="actions">
      <button id="grant" type="button" class="primary">Enable microphone</button>
      <button id="done" type="button" disabled>Done</button>
    </div>

    <p class="status" id="status"></p>

    <script src="app.js"></script>
  </body>
</html>
