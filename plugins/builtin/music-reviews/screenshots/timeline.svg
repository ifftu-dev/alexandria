<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 240" width="640" height="240" font-family="-apple-system,Segoe UI,sans-serif">
  <rect width="640" height="240" rx="10" fill="#0b1020"/>
  <!-- top bar -->
  <text x="20" y="34" fill="#f5f7ff" font-size="20" font-weight="700">0%</text>
  <text x="20" y="50" fill="#aab1c5" font-size="10">ACCURACY</text>
  <text x="320" y="30" fill="#aab1c5" font-size="11" text-anchor="middle">NOW PLAYING</text>
  <text x="320" y="48" fill="#f5f7ff" font-size="15" font-weight="700" text-anchor="middle">C major — ascend and return</text>
  <!-- staff lines -->
  <g stroke="#ffffff22" stroke-width="1">
    <line x1="0" y1="100" x2="640" y2="100"/><line x1="0" y1="120" x2="640" y2="120"/>
    <line x1="0" y1="140" x2="640" y2="140"/><line x1="0" y1="160" x2="640" y2="160"/>
    <line x1="0" y1="180" x2="640" y2="180"/>
  </g>
  <!-- hit line -->
  <line x1="205" y1="70" x2="205" y2="210" stroke="#6366f1" stroke-width="4"/>
  <!-- notes -->
  <g>
    <rect x="205" y="120" width="70" height="40" rx="20" fill="#16a34a33" stroke="#22c55e" stroke-width="2"/>
    <circle cx="205" cy="140" r="9" fill="#22c55e"/>
    <text x="245" y="145" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">C4</text>
    <rect x="300" y="110" width="70" height="40" rx="20" fill="#0b1020" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="300" cy="130" r="9" fill="#f59e0b"/>
    <text x="340" y="135" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">D4</text>
    <rect x="420" y="100" width="120" height="40" rx="20" fill="#0b1020" stroke="#6366f1" stroke-width="2"/>
    <circle cx="420" cy="120" r="9" fill="#6366f1"/>
    <text x="480" y="125" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">G4</text>
  </g>
  <!-- footer tuner -->
  <rect x="20" y="205" width="180" height="26" rx="8" fill="#ffffff0a" stroke="#ffffff14"/>
  <text x="30" y="222" fill="#aab1c5" font-size="11">You</text>
  <text x="120" y="222" fill="#22c55e" font-size="13" font-weight="700">C4</text>
</svg>
