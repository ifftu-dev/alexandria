[package]
name = "alexandria-node"
version = "0.1.0"
description = "Alexandria — Decentralized Learning Platform (Desktop Node)"
authors = ["Alexandria Contributors"]
license = "TBD"
repository = "https://github.com/ifftu-dev/alexandria"
edition = "2021"
rust-version = "1.83.0"

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5.4", features = [] }

[dependencies]
# Tauri
tauri = { version = "2.10.0", features = [] }
tauri-plugin-log = "2"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Async runtime
tokio = { version = "1", features = ["full"] }

# Database
rusqlite = { version = "0.38", features = ["bundled", "uuid"] }

# Cryptography (always available — needed for wallet on all platforms)
ed25519-dalek = { version = "2", features = ["serde", "rand_core"] }
blake2 = "0.10"
sha2 = "0.10"
rand = "0.8"
bip39 = { version = "2", features = ["rand"] }

# Cardano (pallas 0.35 — always available for wallet + tx building)
pallas-wallet = "0.35"
pallas-addresses = "0.35"
pallas-crypto = "0.35"
pallas-txbuilder = "0.35"
pallas-primitives = "0.35"
pallas-traverse = "0.35"
pallas-codec = "0.35"

# Common utilities (all platforms)
anyhow = "1"
bytes = "1"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
log = "0.4"
hex = "0.4"

# ── Desktop-only dependencies ────────────────────────────────────────
# These are excluded on iOS/Android via target gating. The `cfg(desktop)`
# alias is set by tauri-build based on the compile target.
[target.'cfg(not(any(target_os = "ios", target_os = "android")))'.dependencies]
# Content-addressed storage (iroh embedded BLAKE3 blob store)
iroh = "0.96"
iroh-blobs = { version = "0.98", features = ["fs-store"] }
# Secure secret storage (IOTA Stronghold encrypted vault)
iota_stronghold = "2"
hmac = "0.12"
zeroize = { version = "1", features = ["derive"] }
# P2P networking (libp2p swarm)
libp2p = { version = "0.56.0", features = ["gossipsub", "kad", "mdns", "quic", "noise", "identify", "tokio", "ed25519", "macros", "autonat", "relay", "dcutr", "yamux"] }
futures = "0.3"

[dev-dependencies]
tempfile = "3"
