[package]
name = "alexandria-node"
version = "0.1.0"
description = "Alexandria — Decentralized Learning Platform (Desktop Node)"
authors = ["Alexandria Contributors"]
license = "AGPL-3.0"
repository = "https://github.com/pratyushpundir/alexandria-mark3"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5.4", features = [] }

[dependencies]
# Tauri
tauri = { version = "2.10.0", features = [] }
tauri-plugin-log = "2"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Async runtime
tokio = { version = "1", features = ["full"] }

# Database
rusqlite = { version = "0.38", features = ["bundled", "uuid"] }

# Cryptography
ed25519-dalek = { version = "2", features = ["serde", "rand_core"] }
blake2 = "0.10"
sha2 = "0.10"
rand = "0.8"
bip39 = { version = "2", features = ["rand"] }

# Cardano key derivation (CIP-1852 / BIP32-Ed25519)
ed25519-bip32 = "0.4"
hmac = "0.12"

# Utilities
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
log = "0.4"
hex = "0.4"
base64 = "0.22"
