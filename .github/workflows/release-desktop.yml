---
name: Release (Desktop)

'on':
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0)'
        required: false
        type: string
      sign_updater:
        description: 'Sign updater artifacts (enable for production releases; disable for validation tags)'
        required: false
        type: boolean
        default: false
      include_linux_arm64:
        description: 'Build Linux ARM64 (free only on public repos; enable if you have a paid plan or self-hosted runner)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  TAURI_CLI_VERSION: 2.10.0
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
  BUILD_REF: ${{ github.ref_type == 'tag' && github.ref || format('refs/tags/{0}', inputs.tag) }}
  ENABLE_UPDATER_SIGNING: >-
    ${{ (github.event_name == 'push' && !contains(github.ref_name, '-test')) ||
        (github.event_name == 'workflow_dispatch' && inputs.sign_updater == true) }}

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: true

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
      release_upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - name: Validate release tag
        run: |
          if [ -z "${RELEASE_TAG}" ]; then
            echo "workflow_dispatch runs must set the tag input (for example: v1.0.0)." >&2
            exit 1
          fi

      - name: Validate manual tag exists on GitHub
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" \
            >/dev/null; then
            echo "Tag ${RELEASE_TAG} does not exist on ${GITHUB_REPOSITORY}. Create and push it before running Release (Desktop)." >&2
            exit 1
          fi

      - name: Setup Node.js for updater signing preflight
        if: env.ENABLE_UPDATER_SIGNING == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Validate updater signing key
        if: env.ENABLE_UPDATER_SIGNING == 'true'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required when updater signing is enabled." >&2
            exit 1
          fi

          printf 'alexandria updater signing preflight\n' > "${RUNNER_TEMP}/updater-signing.txt"
          npx -y @tauri-apps/cli@${TAURI_CLI_VERSION} signer sign "${RUNNER_TEMP}/updater-signing.txt" >/dev/null
          rm -f "${RUNNER_TEMP}/updater-signing.txt" "${RUNNER_TEMP}/updater-signing.txt.sig"

      - name: Create or reuse draft release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Alexandria ${RELEASE_TAG}" \
              --draft
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Alexandria ${RELEASE_TAG}" \
              --draft \
              --verify-tag \
              --notes ""
          fi

          release_json=""
          for attempt in $(seq 1 10); do
            release_json=$(
              gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate |
                jq -cs --arg tag "${RELEASE_TAG}" \
                  'add | map(select(.tag_name == $tag)) | first // empty'
            )

            if [ -n "${release_json}" ]; then
              break
            fi

            sleep 2
          done

          if [ -z "${release_json}" ]; then
            echo "Could not locate draft release for tag ${RELEASE_TAG} after create/edit." >&2
            exit 1
          fi

          echo "id=$(echo "${release_json}" | jq -r .id)" >> "${GITHUB_OUTPUT}"
          echo "upload_url=$(echo "${release_json}" | jq -r .upload_url)" >> "${GITHUB_OUTPUT}"

  build-macos:
    name: Build macOS (ARM64)
    needs: create-release
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout alexandria
        uses: actions/checkout@v4
        with:
          path: alexandria
          ref: ${{ env.BUILD_REF }}

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v4
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.89.0

      - name: Add ARM64 Apple target
        run: rustup target add aarch64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: alexandria/package-lock.json

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: alexandria/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Disable updater config for validation builds
        if: env.ENABLE_UPDATER_SIGNING != 'true'
        working-directory: alexandria
        run: |
          node -e "const fs=require('fs'); const path='src-tauri/tauri.conf.json'; const cfg=JSON.parse(fs.readFileSync(path,'utf8')); cfg.bundle.createUpdaterArtifacts=false; if (cfg.plugins) delete cfg.plugins.updater; fs.writeFileSync(path, JSON.stringify(cfg, null, 2)+'\n');"

      - name: Import Apple Certificate
        working-directory: alexandria
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Install FFmpeg and autotools (for webrtc-audio-processing-sys/AEC build)
        # glibtoolize (libtool), aclocal/automake, autoconf are all required by the
        # webrtc-audio-processing-sys build script when compiling the AEC module.
        run: brew install cmake ffmpeg libtool automake autoconf

      - name: Write Apple API Key
        run: |
          echo "${{ secrets.APPLE_API_KEY_CONTENT }}" > $RUNNER_TEMP/AuthKey.p8

      - name: Build macOS (ARM64) without updater signing
        if: env.ENABLE_UPDATER_SIGNING != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig
          LIBRARY_PATH: /opt/homebrew/lib
        with:
          projectPath: alexandria
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target aarch64-apple-darwin --bundles dmg --features tutoring-video-aec
          includeUpdaterJson: false

      - name: Build macOS (ARM64) with updater signing
        if: env.ENABLE_UPDATER_SIGNING == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig
          LIBRARY_PATH: /opt/homebrew/lib
        with:
          projectPath: alexandria
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target aarch64-apple-darwin --bundles dmg --features tutoring-video-aec
          includeUpdaterJson: false

  build-linux-x64:
    name: Build Linux (x86_64)
    needs: create-release
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      # Keep Rust toolchains and build artifacts off the root filesystem so apt and
      # bundling work can share the runner's remaining root space.
      RUSTUP_HOME: /mnt/rustup
      CARGO_HOME: /mnt/cargo
      CARGO_TARGET_DIR: /mnt/target
      TMPDIR: /mnt/tmp
    steps:
      - name: Free Linux disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Prepare /mnt directories
        run: |
          sudo mkdir -p /mnt/rustup /mnt/cargo /mnt/target /mnt/tmp
          sudo chown -R "$(id -un):$(id -gn)" /mnt/rustup /mnt/cargo /mnt/target /mnt/tmp
          chmod 1777 /mnt/tmp

      - name: Install Linux system dependencies
        run: |
          sudo add-apt-repository universe -y
          sudo env TMPDIR="$TMPDIR" apt-get update
          sudo env TMPDIR="$TMPDIR" apt-get install -y --no-install-recommends \
            cmake \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            nasm \
            libclang-dev \
            pkg-config \
            libv4l-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libdbus-1-dev \
            libopus-dev \
            libssl-dev \
            libx264-dev \
            libva-dev \
            libgbm-dev \
            libdrm-dev \
            libvdpau-dev

      - name: Checkout alexandria
        uses: actions/checkout@v4
        with:
          path: alexandria
          ref: ${{ env.BUILD_REF }}

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v4
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.89.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: alexandria/package-lock.json

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: alexandria/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Disable updater config for validation builds
        if: env.ENABLE_UPDATER_SIGNING != 'true'
        working-directory: alexandria
        run: |
          node -e "const fs=require('fs'); const path='src-tauri/tauri.conf.json'; const cfg=JSON.parse(fs.readFileSync(path,'utf8')); cfg.bundle.createUpdaterArtifacts=false; if (cfg.plugins) delete cfg.plugins.updater; fs.writeFileSync(path, JSON.stringify(cfg, null, 2)+'\n');"

      - name: Build Linux x86_64 without updater signing
        if: env.ENABLE_UPDATER_SIGNING != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: alexandria
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --features tutoring-video-static --bundles appimage,deb
          includeUpdaterJson: false

      - name: Build Linux x86_64 with updater signing
        if: env.ENABLE_UPDATER_SIGNING == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: alexandria
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --features tutoring-video-static --bundles appimage,deb
          includeUpdaterJson: false

  build-linux-arm64:
    name: Build Linux (ARM64)
    needs: create-release
    # ubuntu-22.04-arm is free for public repos; for private repos enable via
    # workflow_dispatch input (requires GitHub Team/Enterprise or self-hosted runner).
    if: >-
      github.event.repository.visibility == 'public' ||
      inputs.include_linux_arm64 == true
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 90
    env:
      RUSTUP_HOME: /mnt/rustup
      CARGO_HOME: /mnt/cargo
      CARGO_TARGET_DIR: /mnt/target
      TMPDIR: /mnt/tmp
    steps:
      - name: Free Linux disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Prepare /mnt directories
        run: |
          sudo mkdir -p /mnt/rustup /mnt/cargo /mnt/target /mnt/tmp
          sudo chown -R "$(id -un):$(id -gn)" /mnt/rustup /mnt/cargo /mnt/target /mnt/tmp
          chmod 1777 /mnt/tmp

      - name: Install Linux system dependencies
        run: |
          sudo add-apt-repository universe -y
          sudo env TMPDIR="$TMPDIR" apt-get update
          sudo env TMPDIR="$TMPDIR" apt-get install -y --no-install-recommends \
            cmake \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            nasm \
            libclang-dev \
            pkg-config \
            libv4l-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libdbus-1-dev \
            libopus-dev \
            libssl-dev \
            libx264-dev \
            libva-dev \
            libgbm-dev \
            libdrm-dev \
            libvdpau-dev

      - name: Checkout alexandria
        uses: actions/checkout@v4
        with:
          path: alexandria
          ref: ${{ env.BUILD_REF }}

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v4
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.89.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: alexandria/package-lock.json

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: alexandria/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Disable updater config for validation builds
        if: env.ENABLE_UPDATER_SIGNING != 'true'
        working-directory: alexandria
        run: |
          node -e "const fs=require('fs'); const path='src-tauri/tauri.conf.json'; const cfg=JSON.parse(fs.readFileSync(path,'utf8')); cfg.bundle.createUpdaterArtifacts=false; if (cfg.plugins) delete cfg.plugins.updater; fs.writeFileSync(path, JSON.stringify(cfg, null, 2)+'\n');"

      - name: Build Linux ARM64 without updater signing
        if: env.ENABLE_UPDATER_SIGNING != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: alexandria
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --features tutoring-video-static --bundles appimage,deb
          includeUpdaterJson: false

      - name: Build Linux ARM64 with updater signing
        if: env.ENABLE_UPDATER_SIGNING == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: alexandria
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --features tutoring-video-static --bundles appimage,deb
          includeUpdaterJson: false

  build-windows:
    name: Build Windows (x86_64)
    needs: create-release
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      HAS_WINDOWS_CERT: ${{ secrets.WINDOWS_CERTIFICATE != '' }}
    steps:
      - name: Checkout alexandria
        uses: actions/checkout@v4
        with:
          path: alexandria
          ref: ${{ env.BUILD_REF }}

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v4
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup MSVC developer environment
        # ilammy prepends MSVC dirs to PATH; MSYS2 (already on the runner's default PATH)
        # ends up after MSVC, so MSVC link.exe wins over MSYS2's POSIX hard-link tool.
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install autotools via MSYS2 for webrtc-audio-processing-sys (AEC build)
        id: windows-msys2
        # webrtc-audio-processing-sys requires libtoolize, aclocal, automake, autoconf.
        # On Windows these are shell scripts without .exe extensions, so cargo build
        # scripts cannot launch them reliably even if MSYS2's bin directory is on Path.
        # Create .bat shims that invoke the MSYS2 tools through bash and add those shims
        # to the Windows process PATH seen by the later Node-based tauri action.
        shell: pwsh
        run: |
          & 'C:\msys64\usr\bin\bash.exe' -lc "pacman -S --noconfirm --needed libtool automake autoconf make m4"
          Remove-Item 'C:\msys64\usr\bin\link.exe' -Force -ErrorAction SilentlyContinue
          $shimDir = Join-Path $env:RUNNER_TEMP 'msys2-shims'
          New-Item -ItemType Directory -Force -Path $shimDir | Out-Null
          foreach ($tool in @('libtoolize', 'aclocal', 'automake', 'autoconf', 'autoheader', 'autoreconf')) {
            $shimPath = Join-Path $shimDir "$tool.bat"
            Set-Content -Path $shimPath -Encoding ascii -Value @(
              '@echo off'
              """C:\msys64\usr\bin\bash.exe"" -lc ""/usr/bin/$tool %*"""
            )
          }
          $env:Path = "$shimDir;C:\msys64\usr\bin;$env:Path"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "shim_dir=$shimDir"
          Add-Content -Path $env:GITHUB_ENV -Value "Path=$env:Path"
          Add-Content -Path $env:GITHUB_PATH -Value $shimDir
          Add-Content -Path $env:GITHUB_PATH -Value 'C:\msys64\usr\bin'
          Get-Command libtoolize

      - name: Download pre-built FFmpeg for Windows
        id: windows-ffmpeg
        # Build-from-source (tutoring-video-static) fails on Windows due to MSVC/MinGW
        # toolchain conflicts in FFmpeg configure. Use BtbN's pre-built shared libs instead.
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl-shared.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\ffmpeg.zip" -DestinationPath "$env:RUNNER_TEMP\ffmpeg-extracted"
          $ffmpegDir = (Get-ChildItem "$env:RUNNER_TEMP\ffmpeg-extracted" -Directory | Select-Object -First 1).FullName
          Add-Content -Path $env:GITHUB_OUTPUT -Value "root_dir=$ffmpegDir"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "bin_dir=$ffmpegDir\bin"
          echo "FFMPEG_DIR=$ffmpegDir" >> $env:GITHUB_ENV
          echo "$ffmpegDir\bin" >> $env:GITHUB_PATH

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.89.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: alexandria/package-lock.json

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: alexandria/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Disable updater config for validation builds
        if: env.ENABLE_UPDATER_SIGNING != 'true'
        working-directory: alexandria
        shell: pwsh
        run: |
          node -e "const fs=require('fs'); const path='src-tauri/tauri.conf.json'; const cfg=JSON.parse(fs.readFileSync(path,'utf8')); cfg.bundle.createUpdaterArtifacts=false; if (cfg.plugins) delete cfg.plugins.updater; fs.writeFileSync(path, JSON.stringify(cfg, null, 2)+'\n');"

      - name: Prepare Windows build environment
        id: windows-build-env
        shell: pwsh
        run: |
          $msvcBinDir = $null
          if ($env:VCToolsInstallDir) {
            $candidate = Join-Path $env:VCToolsInstallDir 'bin\Hostx64\x64'
            if (Test-Path $candidate) {
              $msvcBinDir = $candidate
            }
          }
          $sdkBinDirs = @()
          foreach ($sdkVar in @('WindowsSdkVerBinPath', 'WindowsSdkBinPath')) {
            $sdkRoot = (Get-Item -Path "Env:$sdkVar" -ErrorAction SilentlyContinue).Value
            if (-not $sdkRoot) {
              continue
            }
            $sdkX64 = Join-Path $sdkRoot 'x64'
            if (Test-Path $sdkX64) {
              $sdkBinDirs += $sdkX64
            } elseif (Test-Path $sdkRoot) {
              $sdkBinDirs += $sdkRoot
            }
          }
          $pathEntries = @(
            $msvcBinDir
          ) + $sdkBinDirs + @(
            '${{ steps.windows-msys2.outputs.shim_dir }}'
            'C:\msys64\usr\bin'
            '${{ steps.windows-ffmpeg.outputs.bin_dir }}'
          ) + ($env:Path -split ';' | Where-Object { $_ })
          $effectivePath = ($pathEntries | Select-Object -Unique) -join ';'
          Add-Content -Path $env:GITHUB_OUTPUT -Value "path=$effectivePath"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "ffmpeg_dir=${{ steps.windows-ffmpeg.outputs.root_dir }}"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "webrtc_cc=clang.exe"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "webrtc_cxx=clang++.exe"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "webrtc_ar=lib.exe"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "webrtc_ld=link.exe"
          Get-Command cargo
          Get-Command node
          Get-Command libtoolize
          Get-Command bash
          Get-Command clang.exe
          Get-Command clang++.exe
          Get-Command cl.exe
          Get-Command link.exe
          Get-Command lib.exe

      - name: Build Windows x86_64 without updater signing
        if: env.ENABLE_UPDATER_SIGNING != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PATH: ${{ steps.windows-build-env.outputs.path }}
          FFMPEG_DIR: ${{ steps.windows-build-env.outputs.ffmpeg_dir }}
          WEBRTC_CC: ${{ steps.windows-build-env.outputs.webrtc_cc }}
          WEBRTC_CXX: ${{ steps.windows-build-env.outputs.webrtc_cxx }}
          WEBRTC_AR: ${{ steps.windows-build-env.outputs.webrtc_ar }}
          WEBRTC_LD: ${{ steps.windows-build-env.outputs.webrtc_ld }}
          MSYS2_BASH_EXE: C:\msys64\usr\bin\bash.exe
        with:
          projectPath: alexandria
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --features tutoring-video --bundles nsis
          includeUpdaterJson: false

      - name: Build Windows x86_64 with updater signing
        if: env.ENABLE_UPDATER_SIGNING == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PATH: ${{ steps.windows-build-env.outputs.path }}
          FFMPEG_DIR: ${{ steps.windows-build-env.outputs.ffmpeg_dir }}
          WEBRTC_CC: ${{ steps.windows-build-env.outputs.webrtc_cc }}
          WEBRTC_CXX: ${{ steps.windows-build-env.outputs.webrtc_cxx }}
          WEBRTC_AR: ${{ steps.windows-build-env.outputs.webrtc_ar }}
          WEBRTC_LD: ${{ steps.windows-build-env.outputs.webrtc_ld }}
          MSYS2_BASH_EXE: C:\msys64\usr\bin\bash.exe
        with:
          projectPath: alexandria
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --features tutoring-video --bundles nsis
          includeUpdaterJson: false

      - name: Sign Windows installer (Authenticode)
        if: env.HAS_WINDOWS_CERT == 'true'
        shell: powershell
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath = Join-Path $env:RUNNER_TEMP "certificate.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          $installers = Get-ChildItem `
            -Path "alexandria\src-tauri\target\release\bundle\nsis" `
            -Filter "*_x64-setup.exe" -Recurse
          foreach ($installer in $installers) {
            & signtool sign `
              /fd SHA256 /td SHA256 `
              /tr http://timestamp.digicert.com `
              /f $certPath /p $env:WINDOWS_CERTIFICATE_PASSWORD `
              $installer.FullName
            Write-Host "Signed: $($installer.Name)"
          }
          Remove-Item -Force $certPath

      - name: Re-upload signed installer
        if: env.HAS_WINDOWS_CERT == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: alexandria/src-tauri/target/release/bundle/nsis/*_x64-setup.exe
          fail_on_unmatched_files: true

  finalize:
    name: Finalize Release
    needs:
      - create-release
      - build-macos
      - build-linux-x64
      - build-linux-arm64
      - build-windows
    runs-on: ubuntu-latest
    if: |
      always() &&
      !cancelled() &&
      ((github.event_name == 'push' && !contains(github.ref_name, '-test')) ||
       (github.event_name == 'workflow_dispatch' && inputs.sign_updater == true)) &&
      needs.build-macos.result == 'success' &&
      needs.build-linux-x64.result == 'success' &&
      needs.build-windows.result == 'success'
    steps:
      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate latest.json for auto-updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          BUILD_LINUX_ARM64_RESULT: ${{ needs.build-linux-arm64.result }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${RELEASE_TAG}"

          # Find the first file matching a glob under artifacts/; prints path or empty.
          find_artifact() { find artifacts -name "$1" -type f 2>/dev/null | head -1; }

          # Locate .sig files for required platforms
          MACOS_SIG_FILE=$(find_artifact "*.dmg.sig")
          LINUX_X64_SIG_FILE=$(find_artifact "*_amd64.AppImage.sig")
          WINDOWS_SIG_FILE=$(find_artifact "*_x64-setup.nsis.zip.sig")

          # Validate all required platform artifacts are present
          MISSING=""
          [ -z "$MACOS_SIG_FILE" ]     && MISSING="${MISSING}  macOS .dmg.sig\n"
          [ -z "$LINUX_X64_SIG_FILE" ] && MISSING="${MISSING}  Linux x64 .AppImage.sig\n"
          [ -z "$WINDOWS_SIG_FILE" ]   && MISSING="${MISSING}  Windows .nsis.zip.sig\n"
          if [ -n "$MISSING" ]; then
            echo "ERROR: Missing required platform signatures:"
            printf "$MISSING"
            exit 1
          fi

          # Build platforms JSON; derive package filename by stripping .sig suffix.
          PLATFORMS="{}"
          add_platform() {
            local key="$1" sig_file="$2"
            local sig pkg url
            sig=$(cat "$sig_file")
            pkg=$(basename "$sig_file" .sig)
            url="$BASE_URL/$pkg"
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg sig "$sig" --arg url "$url" \
              ".\"$key\" = {signature: \$sig, url: \$url}")
          }

          add_platform "darwin-aarch64"    "$MACOS_SIG_FILE"
          add_platform "linux-x86_64"      "$LINUX_X64_SIG_FILE"
          add_platform "windows-x86_64"    "$WINDOWS_SIG_FILE"

          # Conditionally add ARM64 Linux
          if [ "$BUILD_LINUX_ARM64_RESULT" = "success" ]; then
            LINUX_ARM64_SIG_FILE=$(find_artifact "*_arm64.AppImage.sig")
            if [ -n "$LINUX_ARM64_SIG_FILE" ]; then
              add_platform "linux-aarch64" "$LINUX_ARM64_SIG_FILE"
            fi
          fi

          # Write latest.json
          VERSION="${RELEASE_TAG#v}"
          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: "", pub_date: $pub_date, platforms: $platforms}' \
            > latest.json
          cat latest.json

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: latest.json
          fail_on_unmatched_files: false

      - name: Publish release (draft → public)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: false
