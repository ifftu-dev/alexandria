name: Release (Desktop)

# Tag-push triggers an automatic release with the workflow_dispatch
# defaults (all platforms except linux_arm64, signed updater).
# workflow_dispatch is preserved so a human can override per-run.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Immutable tag to publish'
        required: true
        type: string
      sign_updater:
        description: 'Sign updater artifacts'
        required: false
        type: boolean
        default: true
      include_linux:
        description: 'Publish Linux artifacts'
        required: false
        type: boolean
        default: true
      include_windows:
        description: 'Publish Windows artifacts'
        required: false
        type: boolean
        default: true
      include_macos:
        description: 'Publish macOS artifacts'
        required: false
        type: boolean
        default: true
      include_linux_arm64:
        description: 'Publish Linux ARM64 artifacts'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release-desktop:
    uses: ./.github/workflows/desktop-shared.yml
    with:
      mode: release
      # On tag push, `inputs.*` is null — fall back to the workflow_dispatch
      # defaults. The boolean expressions below mirror those defaults:
      #   `push || inputs.X` → defaults true (true on push, user choice on dispatch)
      #   `workflow_dispatch && inputs.X` → defaults false (false on push)
      tag: ${{ inputs.tag || github.ref_name }}
      sign_updater: ${{ github.event_name == 'push' || inputs.sign_updater }}
      include_linux: ${{ github.event_name == 'push' || inputs.include_linux }}
      include_windows: ${{ github.event_name == 'push' || inputs.include_windows }}
      include_macos: ${{ github.event_name == 'push' || inputs.include_macos }}
      include_linux_arm64: ${{ github.event_name == 'workflow_dispatch' && inputs.include_linux_arm64 }}
    secrets: inherit
