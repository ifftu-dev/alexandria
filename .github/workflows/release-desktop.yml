---
name: Release (Desktop)

'on':
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0)'
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
      release_upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: Alexandria ${{ github.ref_name || inputs.tag }}
          draft: true
          generate_release_notes: false

  build-macos:
    name: Build macOS (Universal)
    needs: create-release
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout alexandria
        uses: actions/checkout@v4
        with:
          path: alexandria

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v4
        with:
          repository: ifftu-dev/iroh-live-patched
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.83.0

      - name: Add Universal Apple targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: alexandria/package-lock.json

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: alexandria/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Import Apple Certificate
        working-directory: alexandria
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Write Apple API Key
        run: |
          echo "${{ secrets.APPLE_API_KEY_CONTENT }}" > $RUNNER_TEMP/AuthKey.p8

      - name: Build macOS (Universal)
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: >-
            ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: alexandria
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target universal-apple-darwin --bundles dmg
          includeUpdaterJson: false

  build-linux-x64:
    name: Build Linux (x86_64)
    needs: create-release
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@v10
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Checkout alexandria
        uses: actions/checkout@v4
        with:
          path: alexandria

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v4
        with:
          repository: ifftu-dev/iroh-live-patched
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            nasm \
            libclang-dev \
            pkg-config

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.83.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: alexandria/package-lock.json

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: alexandria/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Build Linux x86_64
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: >-
            ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: alexandria
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --features tutoring-video-static --bundles appimage,deb
          includeUpdaterJson: false

  build-linux-arm64:
    name: Build Linux (ARM64)
    needs: create-release
    if: github.event.repository.visibility == 'public'
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 120
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@v10
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Checkout alexandria
        uses: actions/checkout@v4
        with:
          path: alexandria

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v4
        with:
          repository: ifftu-dev/iroh-live-patched
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            nasm \
            libclang-dev \
            pkg-config

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.83.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: alexandria/package-lock.json

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: alexandria/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Build Linux ARM64
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: >-
            ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: alexandria
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --features tutoring-video-static --bundles appimage,deb
          includeUpdaterJson: false

  build-windows:
    name: Build Windows (x86_64)
    needs: create-release
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout alexandria
        uses: actions/checkout@v4
        with:
          path: alexandria

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v4
        with:
          repository: ifftu-dev/iroh-live-patched
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.83.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: alexandria/package-lock.json

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: alexandria/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Build Windows x86_64
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: >-
            ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: alexandria
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --features tutoring-video-static --bundles nsis
          includeUpdaterJson: false

  finalize:
    name: Finalize Release
    needs:
      - create-release
      - build-macos
      - build-linux-x64
      - build-linux-arm64
      - build-windows
    runs-on: ubuntu-latest
    if: |
      always() &&
      !cancelled() &&
      needs.build-macos.result == 'success' &&
      needs.build-linux-x64.result == 'success' &&
      needs.build-windows.result == 'success'
    steps:
      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate latest.json for auto-updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          BUILD_LINUX_ARM64_RESULT: ${{ needs.build-linux-arm64.result }}
        run: |
          # Get release info to build download URLs
          RELEASE_TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${RELEASE_TAG}"

          # Find .sig files for each platform
          MACOS_SIG=$(cat artifacts/*.dmg.sig 2>/dev/null | head -1 || echo "")
          LINUX_X64_SIG=$(
            cat artifacts/*_amd64.AppImage.sig 2>/dev/null | head -1 || echo ""
          )
          WINDOWS_SIG=$(
            cat artifacts/*_x64-setup.nsis.zip.sig \
              2>/dev/null | head -1 || echo ""
          )

          # Build platforms JSON
          PLATFORMS="{}"

          if [ -n "$MACOS_SIG" ]; then
            MACOS_PKG=$(
              ls artifacts/*.dmg 2>/dev/null | head -1 | xargs basename
            )
            PLATFORMS=$(
              echo "$PLATFORMS" | jq \
                --arg sig "$MACOS_SIG" \
                --arg url "$BASE_URL/$MACOS_PKG" \
                '."darwin-universal" = {signature: $sig, url: $url}'
            )
          fi

          if [ -n "$LINUX_X64_SIG" ]; then
            LINUX_PKG=$(
              ls artifacts/*_amd64.AppImage \
                2>/dev/null | head -1 | xargs basename
            )
            PLATFORMS=$(
              echo "$PLATFORMS" | jq \
                --arg sig "$LINUX_X64_SIG" \
                --arg url "$BASE_URL/$LINUX_PKG" \
                '."linux-x86_64" = {signature: $sig, url: $url}'
            )
          fi

          if [ -n "$WINDOWS_SIG" ]; then
            WIN_PKG=$(
              ls artifacts/*_x64-setup.nsis.zip \
                2>/dev/null | head -1 | xargs basename
            )
            PLATFORMS=$(
              echo "$PLATFORMS" | jq \
                --arg sig "$WINDOWS_SIG" \
                --arg url "$BASE_URL/$WIN_PKG" \
                '."windows-x86_64" = {signature: $sig, url: $url}'
            )
          fi

          # Conditionally add ARM64 Linux
          if [ "$BUILD_LINUX_ARM64_RESULT" = "success" ]; then
            LINUX_ARM64_SIG=$(
              cat artifacts/*_arm64.AppImage.sig \
                2>/dev/null | head -1 || echo ""
            )
            if [ -n "$LINUX_ARM64_SIG" ]; then
              LINUX_ARM64_PKG=$(
                ls artifacts/*_arm64.AppImage \
                  2>/dev/null | head -1 | xargs basename
              )
              PLATFORMS=$(
                echo "$PLATFORMS" | jq \
                  --arg sig "$LINUX_ARM64_SIG" \
                  --arg url "$BASE_URL/$LINUX_ARM64_PKG" \
                  '."linux-aarch64" = {signature: $sig, url: $url}'
              )
            fi
          fi

          # Write latest.json
          VERSION="${RELEASE_TAG#v}"
          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson platforms "$PLATFORMS" \
            '{
              version: $version,
              notes: "",
              pub_date: $pub_date,
              platforms: $platforms
            }' \
            > latest.json
          cat latest.json

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json
          fail_on_unmatched_files: false

      - name: Publish release (draft → public)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
