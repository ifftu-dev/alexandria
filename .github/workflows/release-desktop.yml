name: Release (Desktop)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Immutable tag to publish'
        required: true
        type: string
      sign_updater:
        description: 'Sign updater artifacts'
        required: false
        type: boolean
        default: true
      include_linux:
        description: 'Publish Linux artifacts'
        required: false
        type: boolean
        default: true
      include_windows:
        description: 'Publish Windows artifacts'
        required: false
        type: boolean
        default: true
      include_macos:
        description: 'Publish macOS artifacts'
        required: false
        type: boolean
        default: true
      include_linux_arm64:
        description: 'Publish Linux ARM64 artifacts'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release-desktop:
    uses: ./.github/workflows/desktop-shared.yml
    with:
      mode: release
      tag: ${{ inputs.tag }}
      sign_updater: ${{ inputs.sign_updater }}
      include_linux: ${{ inputs.include_linux }}
      include_windows: ${{ inputs.include_windows }}
      include_macos: ${{ inputs.include_macos }}
      include_linux_arm64: ${{ inputs.include_linux_arm64 }}
    secrets: inherit
