name: Release (Mobile)

# Tag-push triggers an automatic release with the workflow_dispatch
# defaults (Android + iOS, App Store Connect export). workflow_dispatch
# is preserved so a human can override per-run.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Immutable tag to publish'
        required: true
        type: string
      include_android:
        description: 'Publish Android artifacts'
        required: false
        type: boolean
        default: true
      include_ios:
        description: 'Publish iOS artifacts'
        required: false
        type: boolean
        default: true
      ios_export_method:
        description: 'iOS export method for publish runs'
        required: false
        type: choice
        default: app-store-connect
        options:
          - debugging
          - release-testing
          - app-store-connect

permissions:
  contents: write

jobs:
  release-mobile:
    uses: ./.github/workflows/mobile-shared.yml
    with:
      mode: release
      # On tag push, `inputs.*` is null — fall back to the workflow_dispatch
      # defaults (see comment in release-desktop.yml).
      tag: ${{ inputs.tag || github.ref_name }}
      include_android: ${{ github.event_name == 'push' || inputs.include_android }}
      include_ios: ${{ github.event_name == 'push' || inputs.include_ios }}
      ios_export_method: ${{ inputs.ios_export_method || 'app-store-connect' }}
    secrets: inherit
