name: Release (Mobile)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0)'
        required: false
        type: string
      include_android:
        description: 'Build the signed Android release'
        required: false
        type: boolean
        default: true
      include_ios:
        description: 'Build iOS (debugging validates an unsigned build; release-testing/app-store-connect export a signed release)'
        required: false
        type: boolean
        default: false
      ios_export_method:
        description: 'iOS export method for manual runs'
        required: false
        type: choice
        default: debugging
        options:
          - debugging
          - release-testing
          - app-store-connect

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  TAURI_CLI_VERSION: 2.10.0
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
  BUILD_REF: ${{ github.ref_type == 'tag' && github.ref || format('refs/tags/{0}', inputs.tag) }}
  IOS_EXPORT_METHOD: >-
    ${{ github.event_name == 'workflow_dispatch' && inputs.ios_export_method ||
        (contains(github.ref_name, '-test') && 'debugging' || 'app-store-connect') }}

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: true

jobs:
  validate-release-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    steps:
      - name: Ensure a release tag is available
        run: |
          if [ -z "${RELEASE_TAG}" ]; then
            echo "workflow_dispatch runs must set the tag input (for example: v1.0.0)." >&2
            exit 1
          fi

      - name: Validate manual tag exists on GitHub
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" \
            >/dev/null; then
            echo "Tag ${RELEASE_TAG} does not exist on ${GITHUB_REPOSITORY}. Create and push it before running Release (Mobile)." >&2
            exit 1
          fi

  build-ios:
    name: Build iOS
    needs: validate-release-tag
    if: vars.ENABLE_IOS_RELEASE == 'true' || inputs.include_ios == true
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout alexandria
        uses: actions/checkout@v4
        with:
          path: alexandria
          ref: ${{ env.BUILD_REF }}

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v4
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'alexandria/src-tauri -> target'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: alexandria/package-lock.json

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Install CMake
        run: brew install cmake

      - name: Install Tauri CLI
        working-directory: alexandria
        run: npm install --no-save @tauri-apps/cli@${TAURI_CLI_VERSION}

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-tauri (required by Xcode pre-build script)
        run: cargo binstall tauri-cli --version ${TAURI_CLI_VERSION} --no-confirm --locked

      - name: Export Cargo bin to PATH for downstream iOS tooling
        run: echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> $GITHUB_PATH

      - name: Write Apple API Key
        if: env.IOS_EXPORT_METHOD != 'debugging'
        run: echo "${{ secrets.APPLE_API_KEY_CONTENT }}" > $RUNNER_TEMP/AuthKey.p8

      - name: Build iOS (unsigned validation)
        if: env.IOS_EXPORT_METHOD == 'debugging'
        working-directory: alexandria
        run: npx tauri ios build --target aarch64-sim

      - name: Build iOS (signed export)
        if: env.IOS_EXPORT_METHOD != 'debugging'
        working-directory: alexandria
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
        run: npx tauri ios build --export-method "${IOS_EXPORT_METHOD}"

      - name: Upload iOS artifact
        if: env.IOS_EXPORT_METHOD != 'debugging'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            alexandria/src-tauri/gen/apple/build/**/*.ipa
          fail_on_unmatched_files: false

  build-android:
    name: Build Android
    needs: validate-release-tag
    if: github.event_name != 'workflow_dispatch' || inputs.include_android == true
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout alexandria
        uses: actions/checkout@v4
        with:
          path: alexandria
          ref: ${{ env.BUILD_REF }}

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v4
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          targets: aarch64-linux-android

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'alexandria/src-tauri -> target'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: alexandria/package-lock.json

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Install Tauri CLI
        working-directory: alexandria
        run: npm install --no-save @tauri-apps/cli@${TAURI_CLI_VERSION}

      - name: Create cargo-tauri shim for Android Gradle tasks
        run: |
          SHIM_DIR="$RUNNER_TEMP/tauri-cargo-shim"
          mkdir -p "$SHIM_DIR"
          cat > "$SHIM_DIR/cargo-tauri" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          exec "$GITHUB_WORKSPACE/alexandria/node_modules/.bin/tauri" "\$@"
          EOF
          chmod +x "$SHIM_DIR/cargo-tauri"
          echo "$SHIM_DIR" >> $GITHUB_PATH

      - name: Verify Android Tauri CLI availability
        working-directory: alexandria
        run: |
          test -x node_modules/.bin/tauri
          ./node_modules/.bin/tauri --version
          cargo-tauri --version
          npx tauri --version

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > $RUNNER_TEMP/release.jks

      - name: Create keystore.properties
        run: |
          cat > alexandria/src-tauri/gen/android/keystore.properties <<EOF
          password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=${{ runner.temp }}/release.jks
          EOF

      - name: Set Android API 28 toolchain (libaaudio requires API 26+)
        run: |
          NDK_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          SHIM_DIR="$RUNNER_TEMP/android-ndk-bin"
          mkdir -p "$SHIM_DIR"
          ln -sf "$NDK_BIN/llvm-ar" "$SHIM_DIR/aarch64-linux-android-ar"
          ln -sf "$NDK_BIN/llvm-ranlib" "$SHIM_DIR/aarch64-linux-android-ranlib"
          ln -sf "$NDK_BIN/llvm-strip" "$SHIM_DIR/aarch64-linux-android-strip"
          echo "$SHIM_DIR" >> $GITHUB_PATH
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$NDK_BIN/aarch64-linux-android28-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=$NDK_BIN/armv7a-linux-androideabi28-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_I686_LINUX_ANDROID_LINKER=$NDK_BIN/i686-linux-android28-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER=$NDK_BIN/x86_64-linux-android28-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_AR=$NDK_BIN/llvm-ar" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_RANLIB=$NDK_BIN/llvm-ranlib" >> $GITHUB_ENV
          echo "ANDROID_NDK_AR=$NDK_BIN/llvm-ar" >> $GITHUB_ENV
          echo "ANDROID_NDK_RANLIB=$NDK_BIN/llvm-ranlib" >> $GITHUB_ENV
          echo "ANDROID_NDK_STRIP=$NDK_BIN/llvm-strip" >> $GITHUB_ENV

      - name: Build Android (signed release)
        working-directory: alexandria
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_ROOT }}
          NDK_HOME: ${{ env.NDK_HOME }}
          AR: ${{ env.ANDROID_NDK_AR }}
          RANLIB: ${{ env.ANDROID_NDK_RANLIB }}
          STRIP: ${{ env.ANDROID_NDK_STRIP }}
        run: |
          # Signing is configured via keystore.properties written above.
          # Tauri v2 reads that file automatically; do not pass -P flags here
          # as Tauri forwards unknown args to cargo, not Gradle.
          npx tauri android build

      - name: Upload Android artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            alexandria/src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            alexandria/src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
          fail_on_unmatched_files: false
