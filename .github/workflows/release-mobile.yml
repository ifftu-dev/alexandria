name: Release (Mobile)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Immutable tag to publish'
        required: true
        type: string
      include_android:
        description: 'Publish Android artifacts'
        required: false
        type: boolean
        default: true
      include_ios:
        description: 'Publish iOS artifacts'
        required: false
        type: boolean
        default: true
      ios_export_method:
        description: 'iOS export method for publish runs'
        required: false
        type: choice
        default: app-store-connect
        options:
          - debugging
          - release-testing
          - app-store-connect

permissions:
  contents: write

jobs:
  release-mobile:
    uses: ./.github/workflows/mobile-shared.yml
    with:
      mode: release
      tag: ${{ inputs.tag }}
      include_android: ${{ inputs.include_android }}
      include_ios: ${{ inputs.include_ios }}
      ios_export_method: ${{ inputs.ios_export_method }}
    secrets: inherit
