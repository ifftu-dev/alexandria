name: Release (Mobile)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0)'
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout alexandria
        uses: actions/checkout@v4
        with:
          path: alexandria

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v4
        with:
          repository: ifftu-dev/iroh-live-patched
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.83.0
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'alexandria/src-tauri -> target'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: alexandria/package-lock.json

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Install Tauri CLI
        working-directory: alexandria
        run: npm install --save-dev @tauri-apps/cli@latest

      - name: Write Apple API Key
        run: echo "${{ secrets.APPLE_API_KEY_CONTENT }}" > $RUNNER_TEMP/AuthKey.p8

      - name: Build iOS
        working-directory: alexandria
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
        run: npx tauri ios build --export-method app-store-connect

      - name: Upload iOS artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          files: |
            alexandria/src-tauri/gen/apple/build/**/*.ipa
          fail_on_unmatched_files: false

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout alexandria
        uses: actions/checkout@v4
        with:
          path: alexandria

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v4
        with:
          repository: ifftu-dev/iroh-live-patched
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.83.0
        with:
          targets: aarch64-linux-android

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'alexandria/src-tauri -> target'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: alexandria/package-lock.json

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Install Tauri CLI
        working-directory: alexandria
        run: npm install --save-dev @tauri-apps/cli@latest

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > $RUNNER_TEMP/release.jks

      - name: Create keystore.properties
        run: |
          cat > alexandria/src-tauri/gen/android/keystore.properties <<EOF
          password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=${{ runner.temp }}/release.jks
          EOF

      - name: Build Android (signed release)
        working-directory: alexandria
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          # Build via Tauri; pass Gradle signing properties to sign the APK
          npx tauri android build -- \
            -Pandroid.injected.signing.store.file=${{ runner.temp }}/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Upload Android artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          files: |
            alexandria/src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            alexandria/src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
          fail_on_unmatched_files: false
