name: Mobile Build (Shared)

on:
  workflow_call:
    inputs:
      mode:
        required: true
        type: string
      tag:
        required: true
        type: string
      include_android:
        required: false
        type: boolean
        default: true
      include_ios:
        required: false
        type: boolean
        default: false
      ios_export_method:
        required: false
        type: string
        default: debugging

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TAURI_CLI_VERSION: 2.10.0
  RELEASE_TAG: ${{ inputs.tag }}
  BUILD_REF: ${{ format('refs/tags/{0}', inputs.tag) }}

concurrency:
  group: mobile-${{ inputs.mode }}-${{ inputs.tag }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Mobile preflight
    runs-on: ubuntu-latest
    outputs:
      android_signing_mode: ${{ steps.android-signing.outputs.mode }}
    steps:
      - name: Ensure a release tag is available
        run: |
          if [ -z "${RELEASE_TAG}" ]; then
            echo "A tag is required for mobile runs." >&2
            exit 1
          fi

      - name: Validate tag exists on GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" \
            >/dev/null; then
            echo "Tag ${RELEASE_TAG} does not exist on ${GITHUB_REPOSITORY}." >&2
            exit 1
          fi

      - name: Reject debugging exports for release mode
        if: inputs.mode == 'release' && inputs.include_ios == true && inputs.ios_export_method == 'debugging'
        run: |
          echo "Release mode does not support ios_export_method=debugging. Use Validate (Mobile) for simulator builds." >&2
          exit 1

      - name: Detect Android signing mode
        if: inputs.include_android == true
        id: android-signing
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ "${{ inputs.mode }}" = "validate" ]; then
            echo "mode=validation" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ -n "${ANDROID_KEYSTORE}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD}" ] && [ -n "${ANDROID_KEY_ALIAS}" ]; then
            echo "mode=secret" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "mode=temporary" >> "${GITHUB_OUTPUT}"
          echo "Android signing secrets are not fully configured; falling back to a temporary CI keystore for this alpha release." >&2

      - name: Validate Apple export secrets
        if: inputs.include_ios == true && inputs.ios_export_method != 'debugging'
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_IOS_CERTIFICATE: ${{ secrets.APPLE_IOS_CERTIFICATE }}
          APPLE_IOS_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_IOS_CERTIFICATE_PASSWORD }}
        run: |
          for secret_name in APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_CONTENT \
                             APPLE_IOS_CERTIFICATE APPLE_IOS_CERTIFICATE_PASSWORD; do
            if [ -z "$(printenv "${secret_name}")" ]; then
              echo "${secret_name} is required for signed iOS exports." >&2
              exit 1
            fi
          done

      # exportArchive reports "Cloud signing permission error" for every
      # credential fault: a malformed key, a key whose role cannot create
      # signing assets, or an unregistered App ID. Ask App Store Connect
      # directly so a bad credential fails here in ~1 minute rather than
      # ~27 minutes into the archive.
      - name: Probe App Store Connect credentials
        if: inputs.include_ios == true && inputs.ios_export_method != 'debugging'
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_P8 }}
          BUNDLE_ID: org.alexandria.node
        run: |
          set -euo pipefail
          python3 -m pip install --quiet pyjwt cryptography
          python3 - <<'PY'
          import os, sys, time, json, urllib.request, urllib.error, jwt

          key = os.environ["APPLE_API_KEY_CONTENT"]
          bundle_id = os.environ["BUNDLE_ID"]

          if "BEGIN PRIVATE KEY" not in key:
              sys.exit("APPLE_API_KEY_P8 is not a PEM private key. Store the .p8 "
                       "file's literal contents, including the BEGIN/END lines.")

          token = jwt.encode(
              {"iss": os.environ["APPLE_API_ISSUER"], "aud": "appstoreconnect-v1",
               "exp": int(time.time()) + 600},
              key, algorithm="ES256",
              headers={"kid": os.environ["APPLE_API_KEY"], "typ": "JWT"},
          )

          def call(path, payload=None):
              data = json.dumps(payload).encode() if payload is not None else None
              req = urllib.request.Request(
                  f"https://api.appstoreconnect.apple.com/v1/{path}", data=data,
                  headers={"Authorization": f"Bearer {token}",
                           "Content-Type": "application/json"})
              try:
                  with urllib.request.urlopen(req) as r:
                      return r.status, json.load(r)
              except urllib.error.HTTPError as e:
                  return e.code, json.loads(e.read() or b"{}")

          def get(path):
              return call(path)

          def can_create(kind):
              """Probe write permission without creating anything: an
              under-privileged key is rejected with 403 before the payload is
              ever validated, a privileged one falls through to a 400/409
              complaining about the empty body."""
              status, body = call(kind, {"data": {
                  "type": kind, "attributes": {}, "relationships": {}}})
              codes = sorted({e.get("code") for e in body.get("errors", [])})
              print(f"{kind}-create probe: HTTP {status} {codes}")
              return status not in (401, 403)

          status, _ = get("apps?limit=1")
          if status in (401, 403):
              sys.exit(f"App Store Connect rejected the API key (HTTP {status}). "
                       "Check APPLE_API_KEY_ID / APPLE_API_ISSUER_ID / APPLE_API_KEY_P8.")
          print(f"auth ok (HTTP {status})")

          _, body = get(f"bundleIds?filter[identifier]={bundle_id}&limit=1")
          registered = bool(body.get("data"))
          print(f"App ID '{bundle_id}' registered: {registered}")

          _, body = get("certificates?limit=200")
          for c in body.get("data", []):
              a = c["attributes"]
              print(f"cert: {a.get('certificateType')} {a.get('displayName')!r} "
                    f"expires={a.get('expirationDate')}")

          status, body = get("profiles?include=bundleId&limit=200")
          if status in (401, 403):
              sys.exit(f"cannot read provisioning profiles (HTTP {status}); the "
                       "key's role is likely below App Manager.")

          # `included` carries the bundleId each profile is bound to.
          ids = {i["id"]: i["attributes"]["identifier"]
                 for i in body.get("included", []) if i["type"] == "bundleIds"}

          matching = []
          print("provisioning profiles:")
          for p in body.get("data", []):
              a = p["attributes"]
              rel = p.get("relationships", {}).get("bundleId", {}).get("data") or {}
              ident = ids.get(rel.get("id"), "?")
              print(f"  - {a.get('name')!r} type={a.get('profileType')} "
                    f"state={a.get('profileState')} bundle={ident}")
              if (ident == bundle_id
                      and a.get("profileType") == "IOS_APP_STORE"
                      and a.get("profileState") == "ACTIVE"):
                  matching.append(a.get("name"))

          if not registered:
              sys.exit(f"App ID '{bundle_id}' is not registered on the developer "
                       "account. Register it, or grant the API key the App Manager "
                       "role so Xcode can register it via -allowProvisioningUpdates.")

          # With an App Manager key, -allowProvisioningUpdates creates or repairs
          # the profile during the build, so a missing ACTIVE profile is only
          # fatal when the key cannot write. Xcode ignores INVALID profiles,
          # which is why a stale one still reads as "no profiles found".
          # Xcode's cloud signing creates a *cloud-managed certificate*, which is
          # an Admin-only operation; App Manager covers profiles only. Report both
          # so "Cloud signing permission error" maps to a specific missing role.
          can_certs = can_create("certificates")
          print(f"key may create certificates (Admin): {can_certs}")

          if matching:
              print(f"usable profile(s) for {bundle_id}: {matching}")
          elif can_create("profiles"):
              print(f"::warning::no ACTIVE IOS_APP_STORE profile is bound to "
                    f"{bundle_id}; cloud signing will create one during the build.")
          else:
              sys.exit(f"No ACTIVE IOS_APP_STORE profile is bound to '{bundle_id}' "
                       "and the API key cannot create one (HTTP 403). Grant the key "
                       "the App Manager role, or re-select the current distribution "
                       "certificate on the existing profile to make it ACTIVE.")
          PY

      - name: Create or reuse draft release
        if: inputs.mode == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Alexandria ${RELEASE_TAG}" \
              --draft
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Alexandria ${RELEASE_TAG}" \
              --draft \
              --verify-tag \
              --notes ""
          fi

  build-ios:
    name: Build iOS
    needs: prepare
    if: inputs.include_ios == true
    # macos-15 (x86_64) ships Xcode 26.x as a non-default install
    # (alongside Xcode 16.x). We explicitly select 26.3 below.
    # The host architecture doesn't affect iOS bundle output — the
    # Rust toolchain cross-compiles to aarch64-apple-ios regardless.
    # ARM64 macOS pools (macos-26-arm64, macos-15-arm64) were
    # exhausted at dispatch time: a v0.2.0-alpha iOS run sat queued
    # for the full 24h GitHub Actions ceiling and was auto-cancelled
    # without ever picking up a runner. The x86_64 macOS pool turns
    # over in minutes.
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Select Xcode 26.3
        # App Store Connect requires the iOS 26 SDK or later for
        # uploads. The runner default is Xcode 16.x → iOS 18.5 SDK,
        # which the App Store rejects with a 409.
        run: sudo xcode-select --switch /Applications/Xcode_26.3.app

      - name: Checkout alexandria
        uses: actions/checkout@v5
        with:
          path: alexandria
          ref: ${{ env.BUILD_REF }}

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v5
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: alexandria/src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: alexandria/package-lock.json

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Sync release version from tag
        working-directory: alexandria
        run: node scripts/prepare-tauri-config.mjs sync-version "${RELEASE_TAG}"

      - name: Install CMake
        run: brew install cmake

      - name: Install Tauri CLI
        working-directory: alexandria
        run: npm install --no-save @tauri-apps/cli@${TAURI_CLI_VERSION}

      - name: Verify repo-local Tauri CLI
        working-directory: alexandria
        run: |
          test -x node_modules/.bin/tauri
          ./node_modules/.bin/tauri --version

      - name: Write Apple API Key
        if: inputs.ios_export_method != 'debugging'
        run: echo "${{ secrets.APPLE_API_KEY_P8 }}" > $RUNNER_TEMP/AuthKey.p8

      # The Tauri CLI signs manually only when handed a certificate and a
      # profile. Guarantee an ACTIVE App Store profile that is bound to the
      # bundle id, carries the capabilities the app entitles (associated
      # domains, for universal links), and embeds the current distribution
      # certificate. A profile goes INVALID when its certificate is replaced or
      # a capability changes, and xcodebuild silently ignores INVALID profiles.
      - name: Ensure an App Store provisioning profile
        if: inputs.ios_export_method != 'debugging'
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_P8 }}
          BUNDLE_ID: org.alexandria.node
          PROFILE_NAME: Alexandria iOS App Store (CI)
        run: |
          set -euo pipefail
          python3 -m pip install --quiet --break-system-packages pyjwt cryptography \
            || python3 -m pip install --quiet pyjwt cryptography
          python3 - <<'PY'
          import base64, json, os, pathlib, sys, time, urllib.error, urllib.request, jwt

          bundle_id = os.environ["BUNDLE_ID"]
          profile_name = os.environ["PROFILE_NAME"]
          # Mirrors src-tauri/gen/apple/alexandria-node_iOS.entitlements.
          required_caps = {"ASSOCIATED_DOMAINS"}

          token = jwt.encode(
              {"iss": os.environ["APPLE_API_ISSUER"], "aud": "appstoreconnect-v1",
               "exp": int(time.time()) + 600},
              os.environ["APPLE_API_KEY_CONTENT"], algorithm="ES256",
              headers={"kid": os.environ["APPLE_API_KEY"], "typ": "JWT"},
          )

          def call(path, payload=None, method=None):
              req = urllib.request.Request(
                  f"https://api.appstoreconnect.apple.com/v1/{path}",
                  data=json.dumps(payload).encode() if payload else None,
                  method=method,
                  headers={"Authorization": f"Bearer {token}",
                           "Content-Type": "application/json"})
              try:
                  with urllib.request.urlopen(req) as r:
                      return r.status, json.loads(r.read() or b"{}")
              except urllib.error.HTTPError as e:
                  return e.code, json.loads(e.read() or b"{}")

          def fail(msg, body=None):
              for err in (body or {}).get("errors", []):
                  print(f"  {err.get('code')}: {err.get('detail')}", file=sys.stderr)
              sys.exit(msg)

          status, body = call(f"bundleIds?filter[identifier]={bundle_id}&limit=1")
          if not body.get("data"):
              fail(f"App ID '{bundle_id}' is not registered.", body)
          bundle_ref = body["data"][0]["id"]

          # xcodebuild fails with "requires a provisioning profile with the
          # <feature> feature" when the App ID lacks a capability the app
          # entitles. Enabling one invalidates existing profiles, so any profile
          # must be minted after this.
          _, body = call(f"bundleIds/{bundle_ref}/bundleIdCapabilities?limit=200")
          present = {c["attributes"]["capabilityType"] for c in body.get("data", [])}
          added = required_caps - present
          for cap in sorted(added):
              status, body = call("bundleIdCapabilities", {"data": {
                  "type": "bundleIdCapabilities",
                  "attributes": {"capabilityType": cap},
                  "relationships": {
                      "bundleId": {"data": {"id": bundle_ref, "type": "bundleIds"}}}}})
              if status not in (200, 201):
                  fail(f"could not enable {cap} on '{bundle_id}' (HTTP {status}).", body)
              print(f"enabled capability {cap} on {bundle_id}")
          print(f"capabilities: {sorted(present | required_caps)}")

          _, body = call("profiles?include=bundleId&limit=200")
          ids = {i["id"]: i["attributes"]["identifier"]
                 for i in body.get("included", []) if i["type"] == "bundleIds"}

          def bound_to(p):
              rel = p.get("relationships", {}).get("bundleId", {}).get("data") or {}
              return ids.get(rel.get("id"))

          # A profile snapshots the App ID's capabilities at creation time, so an
          # existing one may predate a capability. Always recreate the CI-owned
          # profile from the current App ID state; only ever touch our own name,
          # never a hand-made profile.
          for p in body.get("data", []):
              if p["attributes"]["name"] == profile_name:
                  print(f"deleting prior {profile_name!r} ({p['attributes']['profileState']})")
                  call(f"profiles/{p['id']}", method="DELETE")

          status, body = call("certificates?filter[certificateType]=DISTRIBUTION")
          certs = body.get("data", [])
          if not certs:
              fail("no DISTRIBUTION certificate exists on the account.", body)
          cert_ref = certs[0]["id"]
          print(f"using certificate {certs[0]['attributes'].get('displayName')!r} "
                f"(expires {certs[0]['attributes'].get('expirationDate')})")

          status, body = call("profiles", {"data": {
              "type": "profiles",
              "attributes": {"name": profile_name, "profileType": "IOS_APP_STORE"},
              "relationships": {
                  "bundleId": {"data": {"id": bundle_ref, "type": "bundleIds"}},
                  "certificates": {"data": [{"id": cert_ref, "type": "certificates"}]},
              }}})
          if status not in (200, 201):
              fail(f"could not create the provisioning profile (HTTP {status}).", body)
          profile = body["data"]
          print(f"created profile {profile_name!r}")

          attrs = profile["attributes"]
          if attrs["profileState"] != "ACTIVE":
              fail(f"profile is {attrs['profileState']}, not ACTIVE.")

          # A profile embeds its entitlements as a cleartext plist inside the CMS
          # blob. xcodebuild demands the associated-domains key be present, so
          # confirm the profile actually carries it rather than trusting that
          # enabling the capability propagated before the profile was minted.
          import plistlib
          raw = base64.b64decode(attrs["profileContent"])
          pl = plistlib.loads(raw[raw.index(b"<?xml"):raw.index(b"</plist>") + 8])
          ent = pl.get("Entitlements", {})
          print(f"profile entitlements: {sorted(ent)}")
          if "com.apple.developer.associated-domains" not in ent:
              fail("the minted profile does not carry associated-domains; the "
                   "capability likely had not propagated when it was created.")

          # Install it so xcodebuild resolves it from disk rather than the cloud.
          dest = pathlib.Path.home() / "Library/MobileDevice/Provisioning Profiles"
          dest.mkdir(parents=True, exist_ok=True)
          path = dest / f"{attrs['uuid']}.mobileprovision"
          path.write_bytes(base64.b64decode(attrs["profileContent"]))
          print(f"installed {attrs['name']!r} uuid={attrs['uuid']} -> {path}")
          # The Tauri project uses Xcode-managed (automatic) signing; the build
          # step passes the App Store Connect API key so xcodebuild provisions
          # against the portal. This step's job is to make that provisioning
          # succeed deterministically: the capability is enabled and an ACTIVE
          # profile already exists, so -allowProvisioningUpdates has nothing left
          # to create.
          PY

      - name: Strip alpha channel from iOS app icons
        working-directory: alexandria/src-tauri/gen/apple/Assets.xcassets/AppIcon.appiconset
        run: |
          swift - <<'SWIFT'
          import CoreGraphics
          import Foundation
          import ImageIO
          let fm = FileManager.default
          let dir = fm.currentDirectoryPath
          let files = try fm.contentsOfDirectory(atPath: dir).filter { $0.hasSuffix(".png") }.sorted()
          for file in files {
              let url = URL(fileURLWithPath: "\(dir)/\(file)") as CFURL
              guard let source = CGImageSourceCreateWithURL(url, nil),
                    let image = CGImageSourceCreateImageAtIndex(source, 0, nil) else { continue }
              let alpha = image.alphaInfo
              if alpha == .none || alpha == .noneSkipLast || alpha == .noneSkipFirst { continue }
              print("Stripping alpha from \(file)")
              let w = image.width, h = image.height
              let cs = CGColorSpaceCreateDeviceRGB()
              guard let ctx = CGContext(data: nil, width: w, height: h, bitsPerComponent: 8,
                                       bytesPerRow: w * 4, space: cs,
                                       bitmapInfo: CGImageAlphaInfo.noneSkipLast.rawValue) else {
                  fatalError("Cannot create context for \(file)")
              }
              ctx.setFillColor(CGColor(red: 1, green: 1, blue: 1, alpha: 1))
              ctx.fill(CGRect(x: 0, y: 0, width: w, height: h))
              ctx.draw(image, in: CGRect(x: 0, y: 0, width: w, height: h))
              guard let out = ctx.makeImage(),
                    let dest = CGImageDestinationCreateWithURL(url, "public.png" as CFString, 1, nil) else {
                  fatalError("Cannot write \(file)")
              }
              CGImageDestinationAddImage(dest, out, nil)
              CGImageDestinationFinalize(dest)
          }
          SWIFT
          # Verify no alpha remains
          for icon in *.png; do
            if sips -g hasAlpha "$icon" 2>/dev/null | grep -q 'yes'; then
              echo "ERROR: $icon still has alpha channel" >&2
              exit 1
            fi
          done
          echo "All icons verified: no alpha channel"

      - name: Build iOS artifacts
        if: inputs.ios_export_method == 'debugging'
        working-directory: alexandria
        env:
          IOS_EXPORT_METHOD: ${{ inputs.ios_export_method }}
        run: |
          npx tauri ios build --config src-tauri/tauri.ios.conf.json --target aarch64-sim

      # Xcode-managed (automatic) signing. The earlier "Ensure an App Store
      # provisioning profile" step guarantees the two things automatic signing
      # cannot fix on its own — the associated-domains capability on the App ID
      # and an ACTIVE distribution profile — so provisioning here is resolved
      # against the portal without needing to create anything. APPLE_DEVELOPMENT_
      # TEAM must be set or signing resolves to "Apple Distribution: (unset)".
      - name: Build signed iOS artifacts
        if: inputs.ios_export_method != 'debugging'
        working-directory: alexandria
        env:
          IOS_EXPORT_METHOD: ${{ inputs.ios_export_method }}
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID || 'VLMNL3V44U' }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
        run: |
          npx tauri ios build --config src-tauri/tauri.ios.conf.json --export-method "${IOS_EXPORT_METHOD}"

      - name: Upload iOS validation artifacts
        if: inputs.mode == 'validate'
        uses: actions/upload-artifact@v6
        with:
          name: mobile-ios
          path: alexandria/src-tauri/gen/apple/build/**/*
          if-no-files-found: error

      - name: Upload iOS release artifact
        if: inputs.mode == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          ipa_file=$(find alexandria/src-tauri/gen/apple/build -name '*.ipa' -type f | head -1)
          if [ -z "${ipa_file}" ]; then
            echo "No iOS .ipa artifact was produced." >&2
            exit 1
          fi
          FRIENDLY_NAME="Alexandria-${VERSION}-iOS.ipa"
          cp "$ipa_file" "/tmp/${FRIENDLY_NAME}"
          gh release upload "${RELEASE_TAG}" "/tmp/${FRIENDLY_NAME}" --clobber --repo "${GITHUB_REPOSITORY}"

      - name: Upload to TestFlight
        if: inputs.mode == 'release' && inputs.ios_export_method == 'app-store-connect'
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
        run: |
          set -euo pipefail
          # altool searches for AuthKey_<KEY_ID>.p8 in ~/private_keys/
          mkdir -p ~/private_keys
          cp "$APPLE_API_KEY_PATH" ~/private_keys/AuthKey_${APPLE_API_KEY}.p8
          ipa_file=$(find alexandria/src-tauri/gen/apple/build -name '*.ipa' -type f | head -1)
          echo "Uploading ${ipa_file} to App Store Connect (TestFlight)..."
          xcrun altool --upload-app \
            --type ios \
            --file "$ipa_file" \
            --apiKey "$APPLE_API_KEY" \
            --apiIssuer "$APPLE_API_ISSUER"
          echo "TestFlight upload complete — build will appear after Apple processing (usually 5-15 minutes)"

  build-android:
    name: Build Android
    needs: prepare
    if: inputs.include_android == true
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RUSTUP_HOME: /mnt/rustup
      CARGO_HOME: /mnt/cargo
      CARGO_TARGET_DIR: /mnt/target
      TMPDIR: /mnt/tmp
      GRADLE_USER_HOME: /mnt/gradle
    steps:
      - name: Free Linux disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Prepare /mnt directories
        run: |
          sudo mkdir -p /mnt/rustup /mnt/cargo /mnt/target /mnt/tmp /mnt/gradle
          sudo chown -R "$(id -un):$(id -gn)" /mnt/rustup /mnt/cargo /mnt/target /mnt/tmp /mnt/gradle
          chmod 1777 /mnt/tmp

      - name: Checkout alexandria
        uses: actions/checkout@v5
        with:
          path: alexandria
          ref: ${{ env.BUILD_REF }}

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v5
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install CMake
        run: |
          sudo env TMPDIR="$TMPDIR" apt-get update
          sudo env TMPDIR="$TMPDIR" apt-get install -y cmake

      - name: Use preinstalled Android NDK
        run: |
          NDK_DIR="$(find "$ANDROID_SDK_ROOT/ndk" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -1)"
          if [ -z "$NDK_DIR" ]; then
            echo "No Android NDK installation was found under $ANDROID_SDK_ROOT/ndk." >&2
            exit 1
          fi
          SYSROOT_DIR="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          if [ ! -d "$SYSROOT_DIR" ]; then
            echo "Android NDK sysroot was not found at $SYSROOT_DIR." >&2
            exit 1
          fi
          echo "Using Android NDK at $NDK_DIR"
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$NDK_DIR" >> $GITHUB_ENV
          echo "NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
          echo "CARGO_NDK_SYSROOT_PATH=$SYSROOT_DIR" >> $GITHUB_ENV
          echo "SYSROOT=$SYSROOT_DIR" >> $GITHUB_ENV

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          targets: aarch64-linux-android

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: alexandria/src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: alexandria/package-lock.json

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Sync release version from tag
        working-directory: alexandria
        run: node scripts/prepare-tauri-config.mjs sync-version "${RELEASE_TAG}"

      - name: Install Tauri CLI
        working-directory: alexandria
        run: npm install --no-save @tauri-apps/cli@${TAURI_CLI_VERSION}

      - name: Create cargo-tauri shim for Android Gradle tasks
        run: |
          SHIM_DIR="$RUNNER_TEMP/tauri-cargo-shim"
          mkdir -p "$SHIM_DIR"
          cat > "$SHIM_DIR/cargo-tauri" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          if [ "\${1:-}" = "tauri" ]; then
            shift
          fi
          exec "$GITHUB_WORKSPACE/alexandria/node_modules/.bin/tauri" "\$@"
          EOF
          chmod +x "$SHIM_DIR/cargo-tauri"
          echo "$SHIM_DIR" >> $GITHUB_PATH

      - name: Verify Android Tauri CLI availability
        working-directory: alexandria
        run: |
          test -x node_modules/.bin/tauri
          ./node_modules/.bin/tauri --version
          cargo-tauri --version
          npx tauri --version

      - name: Decode Android keystore
        if: needs.prepare.outputs.android_signing_mode == 'secret'
        run: echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > $RUNNER_TEMP/release.jks

      - name: Create secret keystore.properties
        if: needs.prepare.outputs.android_signing_mode == 'secret'
        run: |
          cat > alexandria/src-tauri/gen/android/keystore.properties <<EOF
          password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=${{ runner.temp }}/release.jks
          EOF

      - name: Create temporary Android validation keystore
        if: needs.prepare.outputs.android_signing_mode == 'validation'
        run: |
          VALIDATION_KEYSTORE="$RUNNER_TEMP/validation-release.jks"
          keytool -genkeypair \
            -alias validation \
            -keystore "$VALIDATION_KEYSTORE" \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=Alexandria Validation, OU=CI, O=Alexandria, L=CI, S=CI, C=US"
          cat > alexandria/src-tauri/gen/android/keystore.properties <<EOF
          password=android
          keyAlias=validation
          storeFile=$VALIDATION_KEYSTORE
          EOF

      - name: Create temporary Android release keystore
        if: needs.prepare.outputs.android_signing_mode == 'temporary'
        run: |
          RELEASE_KEYSTORE="$RUNNER_TEMP/release.jks"
          keytool -genkeypair \
            -alias release \
            -keystore "$RELEASE_KEYSTORE" \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=Alexandria Release CI, OU=CI, O=Alexandria, L=CI, S=CI, C=US"
          cat > alexandria/src-tauri/gen/android/keystore.properties <<EOF
          password=android
          keyAlias=release
          storeFile=$RELEASE_KEYSTORE
          EOF

      - name: Set Android API 28 toolchain
        run: |
          NDK_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          ANDROID_CC="$NDK_BIN/aarch64-linux-android28-clang"
          ANDROID_NM="$NDK_BIN/llvm-nm"
          ANDROID_CFLAGS="--sysroot=$CARGO_NDK_SYSROOT_PATH"
          SHIM_DIR="$RUNNER_TEMP/android-ndk-bin"
          mkdir -p "$SHIM_DIR"
          ln -sf "$NDK_BIN/llvm-ar" "$SHIM_DIR/aarch64-linux-android-ar"
          ln -sf "$NDK_BIN/llvm-ranlib" "$SHIM_DIR/aarch64-linux-android-ranlib"
          ln -sf "$NDK_BIN/llvm-strip" "$SHIM_DIR/aarch64-linux-android-strip"
          ln -sf "$NDK_BIN/llvm-nm" "$SHIM_DIR/aarch64-linux-android-nm"
          echo "ANDROID_NDK_SHIM_DIR=$SHIM_DIR" >> $GITHUB_ENV
          echo "$SHIM_DIR" >> $GITHUB_PATH
          echo "ANDROID_AARCH64_CC=$ANDROID_CC" >> $GITHUB_ENV
          echo "ANDROID_AARCH64_NM=$ANDROID_NM" >> $GITHUB_ENV
          echo "ANDROID_AARCH64_CFLAGS=$ANDROID_CFLAGS" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ANDROID_CC" >> $GITHUB_ENV
          echo "CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=$NDK_BIN/armv7a-linux-androideabi28-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_I686_LINUX_ANDROID_LINKER=$NDK_BIN/i686-linux-android28-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER=$NDK_BIN/x86_64-linux-android28-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_AR=$NDK_BIN/llvm-ar" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_RANLIB=$NDK_BIN/llvm-ranlib" >> $GITHUB_ENV
          echo "NM=$ANDROID_NM" >> $GITHUB_ENV
          echo "NM_aarch64-linux-android=$ANDROID_NM" >> $GITHUB_ENV
          echo "NM_aarch64_linux_android=$ANDROID_NM" >> $GITHUB_ENV
          echo "CC_aarch64-linux-android=$ANDROID_CC" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=$ANDROID_CC" >> $GITHUB_ENV
          echo "CFLAGS_aarch64-linux-android=$ANDROID_CFLAGS" >> $GITHUB_ENV
          echo "CFLAGS_aarch64_linux_android=$ANDROID_CFLAGS" >> $GITHUB_ENV
          echo "ANDROID_NDK_AR=$NDK_BIN/llvm-ar" >> $GITHUB_ENV
          echo "ANDROID_NDK_RANLIB=$NDK_BIN/llvm-ranlib" >> $GITHUB_ENV
          echo "ANDROID_NDK_STRIP=$NDK_BIN/llvm-strip" >> $GITHUB_ENV

      - name: Build Android artifacts
        working-directory: alexandria
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_ROOT }}
          NDK_HOME: ${{ env.NDK_HOME }}
          CARGO_NDK_SYSROOT_PATH: ${{ env.CARGO_NDK_SYSROOT_PATH }}
          SYSROOT: ${{ env.SYSROOT }}
          AR: ${{ env.ANDROID_NDK_AR }}
          RANLIB: ${{ env.ANDROID_NDK_RANLIB }}
          STRIP: ${{ env.ANDROID_NDK_STRIP }}
          NM: ${{ env.ANDROID_AARCH64_NM }}
          NM_aarch64-linux-android: ${{ env.ANDROID_AARCH64_NM }}
          NM_aarch64_linux_android: ${{ env.ANDROID_AARCH64_NM }}
          TARGET_CC: ${{ env.ANDROID_AARCH64_CC }}
          TARGET_CFLAGS: ${{ env.ANDROID_AARCH64_CFLAGS }}
          CC_aarch64_linux_android: ${{ env.ANDROID_AARCH64_CC }}
          CC_aarch64-linux-android: ${{ env.ANDROID_AARCH64_CC }}
          CFLAGS_aarch64_linux_android: ${{ env.ANDROID_AARCH64_CFLAGS }}
          CFLAGS_aarch64-linux-android: ${{ env.ANDROID_AARCH64_CFLAGS }}
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ env.ANDROID_AARCH64_CC }}
          CARGO_TARGET_AARCH64_LINUX_ANDROID_AR: ${{ env.ANDROID_NDK_AR }}
          CARGO_TARGET_AARCH64_LINUX_ANDROID_RANLIB: ${{ env.ANDROID_NDK_RANLIB }}
        run: |
          export PATH="${ANDROID_NDK_SHIM_DIR}:$PATH"
          env \
            "CARGO_NDK_SYSROOT_PATH=${CARGO_NDK_SYSROOT_PATH}" \
            "SYSROOT=${SYSROOT}" \
            "NM=${ANDROID_AARCH64_NM}" \
            "NM_aarch64_linux_android=${ANDROID_AARCH64_NM}" \
            "NM_aarch64-linux-android=${ANDROID_AARCH64_NM}" \
            "CC_aarch64_linux_android=${ANDROID_AARCH64_CC}" \
            "CC_aarch64-linux-android=${ANDROID_AARCH64_CC}" \
            "CFLAGS_aarch64_linux_android=${ANDROID_AARCH64_CFLAGS}" \
            "CFLAGS_aarch64-linux-android=${ANDROID_AARCH64_CFLAGS}" \
            npx tauri android build --target aarch64 --config src-tauri/tauri.android.conf.json

      - name: Upload Android validation artifacts
        if: inputs.mode == 'validate'
        uses: actions/upload-artifact@v6
        with:
          name: mobile-android
          path: |
            alexandria/src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            alexandria/src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
          if-no-files-found: error

      - name: Upload Android release artifacts
        if: inputs.mode == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          apk_file=$(find alexandria/src-tauri/gen/android/app/build/outputs/apk/universal/release -name '*.apk' -type f | head -1)
          aab_file=$(find alexandria/src-tauri/gen/android/app/build/outputs/bundle/universalRelease -name '*.aab' -type f | head -1)
          [ -n "$apk_file" ] && cp "$apk_file" "/tmp/Alexandria-${VERSION}-Android.apk"
          [ -n "$aab_file" ] && cp "$aab_file" "/tmp/Alexandria-${VERSION}-Android.aab"
          gh release upload "${RELEASE_TAG}" \
            "/tmp/Alexandria-${VERSION}-Android.apk" \
            "/tmp/Alexandria-${VERSION}-Android.aab" \
            --clobber \
            --repo "${GITHUB_REPOSITORY}"

      - name: Upload to Google Play (internal testing)
        if: inputs.mode == 'release' && needs.prepare.outputs.android_signing_mode == 'secret'
        uses: r0adkll/upload-google-play@v1
        continue-on-error: true
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: org.alexandria.node
          releaseFiles: alexandria/src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
          track: internal
          status: completed
