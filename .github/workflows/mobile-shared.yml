name: Mobile Build (Shared)

on:
  workflow_call:
    inputs:
      mode:
        required: true
        type: string
      tag:
        required: true
        type: string
      include_android:
        required: false
        type: boolean
        default: true
      include_ios:
        required: false
        type: boolean
        default: false
      ios_export_method:
        required: false
        type: string
        default: debugging

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TAURI_CLI_VERSION: 2.10.0
  RELEASE_TAG: ${{ inputs.tag }}
  BUILD_REF: ${{ format('refs/tags/{0}', inputs.tag) }}

concurrency:
  group: mobile-${{ inputs.mode }}-${{ inputs.tag }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Mobile preflight
    runs-on: ubuntu-latest
    outputs:
      android_signing_mode: ${{ steps.android-signing.outputs.mode }}
    steps:
      - name: Ensure a release tag is available
        run: |
          if [ -z "${RELEASE_TAG}" ]; then
            echo "A tag is required for mobile runs." >&2
            exit 1
          fi

      - name: Validate tag exists on GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" \
            >/dev/null; then
            echo "Tag ${RELEASE_TAG} does not exist on ${GITHUB_REPOSITORY}." >&2
            exit 1
          fi

      - name: Reject debugging exports for release mode
        if: inputs.mode == 'release' && inputs.include_ios == true && inputs.ios_export_method == 'debugging'
        run: |
          echo "Release mode does not support ios_export_method=debugging. Use Validate (Mobile) for simulator builds." >&2
          exit 1

      - name: Detect Android signing mode
        if: inputs.include_android == true
        id: android-signing
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ "${{ inputs.mode }}" = "validate" ]; then
            echo "mode=validation" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ -n "${ANDROID_KEYSTORE}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD}" ] && [ -n "${ANDROID_KEY_ALIAS}" ]; then
            echo "mode=secret" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "mode=temporary" >> "${GITHUB_OUTPUT}"
          echo "Android signing secrets are not fully configured; falling back to a temporary CI keystore for this alpha release." >&2

      - name: Validate Apple export secrets
        if: inputs.include_ios == true && inputs.ios_export_method != 'debugging'
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          for secret_name in APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_CONTENT; do
            if [ -z "$(printenv "${secret_name}")" ]; then
              echo "${secret_name} is required for signed iOS exports." >&2
              exit 1
            fi
          done

      - name: Create or reuse draft release
        if: inputs.mode == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Alexandria ${RELEASE_TAG}" \
              --draft
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Alexandria ${RELEASE_TAG}" \
              --draft \
              --verify-tag \
              --notes ""
          fi

  build-ios:
    name: Build iOS
    needs: prepare
    if: inputs.include_ios == true
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout alexandria
        uses: actions/checkout@v5
        with:
          path: alexandria
          ref: ${{ env.BUILD_REF }}

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v5
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: alexandria/src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: alexandria/package-lock.json

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Sync release version from tag
        working-directory: alexandria
        run: node scripts/prepare-tauri-config.mjs sync-version "${RELEASE_TAG}"

      - name: Install CMake
        run: brew install cmake

      - name: Install Tauri CLI
        working-directory: alexandria
        run: npm install --no-save @tauri-apps/cli@${TAURI_CLI_VERSION}

      - name: Verify repo-local Tauri CLI
        working-directory: alexandria
        run: |
          test -x node_modules/.bin/tauri
          ./node_modules/.bin/tauri --version

      - name: Write Apple API Key
        if: inputs.ios_export_method != 'debugging'
        run: echo "${{ secrets.APPLE_API_KEY_CONTENT }}" > $RUNNER_TEMP/AuthKey.p8

      - name: Strip alpha channel from iOS app icons
        working-directory: alexandria/src-tauri/gen/apple/Assets.xcassets/AppIcon.appiconset
        run: |
          swift - <<'SWIFT'
          import CoreGraphics
          import Foundation
          import ImageIO
          let fm = FileManager.default
          let dir = fm.currentDirectoryPath
          let files = try fm.contentsOfDirectory(atPath: dir).filter { $0.hasSuffix(".png") }.sorted()
          for file in files {
              let url = URL(fileURLWithPath: "\(dir)/\(file)") as CFURL
              guard let source = CGImageSourceCreateWithURL(url, nil),
                    let image = CGImageSourceCreateImageAtIndex(source, 0, nil) else { continue }
              let alpha = image.alphaInfo
              if alpha == .none || alpha == .noneSkipLast || alpha == .noneSkipFirst { continue }
              print("Stripping alpha from \(file)")
              let w = image.width, h = image.height
              let cs = CGColorSpaceCreateDeviceRGB()
              guard let ctx = CGContext(data: nil, width: w, height: h, bitsPerComponent: 8,
                                       bytesPerRow: w * 4, space: cs,
                                       bitmapInfo: CGImageAlphaInfo.noneSkipLast.rawValue) else {
                  fatalError("Cannot create context for \(file)")
              }
              ctx.setFillColor(CGColor(red: 1, green: 1, blue: 1, alpha: 1))
              ctx.fill(CGRect(x: 0, y: 0, width: w, height: h))
              ctx.draw(image, in: CGRect(x: 0, y: 0, width: w, height: h))
              guard let out = ctx.makeImage(),
                    let dest = CGImageDestinationCreateWithURL(url, "public.png" as CFString, 1, nil) else {
                  fatalError("Cannot write \(file)")
              }
              CGImageDestinationAddImage(dest, out, nil)
              CGImageDestinationFinalize(dest)
          }
          SWIFT
          # Verify no alpha remains
          for icon in *.png; do
            if sips -g hasAlpha "$icon" 2>/dev/null | grep -q 'yes'; then
              echo "ERROR: $icon still has alpha channel" >&2
              exit 1
            fi
          done
          echo "All icons verified: no alpha channel"

      - name: Build iOS artifacts
        if: inputs.ios_export_method == 'debugging'
        working-directory: alexandria
        env:
          IOS_EXPORT_METHOD: ${{ inputs.ios_export_method }}
        run: |
          npx tauri ios build --config src-tauri/tauri.ios.conf.json --target aarch64-sim

      - name: Build signed iOS artifacts
        if: inputs.ios_export_method != 'debugging'
        working-directory: alexandria
        env:
          IOS_EXPORT_METHOD: ${{ inputs.ios_export_method }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
        run: |
          npx tauri ios build --config src-tauri/tauri.ios.conf.json --export-method "${IOS_EXPORT_METHOD}"

      - name: Upload iOS validation artifacts
        if: inputs.mode == 'validate'
        uses: actions/upload-artifact@v6
        with:
          name: mobile-ios
          path: alexandria/src-tauri/gen/apple/build/**/*
          if-no-files-found: error

      - name: Upload iOS release artifact
        if: inputs.mode == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          ipa_file=$(find alexandria/src-tauri/gen/apple/build -name '*.ipa' -type f | head -1)
          if [ -z "${ipa_file}" ]; then
            echo "No iOS .ipa artifact was produced." >&2
            exit 1
          fi
          FRIENDLY_NAME="Alexandria-${VERSION}-iOS.ipa"
          cp "$ipa_file" "/tmp/${FRIENDLY_NAME}"
          gh release upload "${RELEASE_TAG}" "/tmp/${FRIENDLY_NAME}" --clobber --repo "${GITHUB_REPOSITORY}"

      - name: Upload to TestFlight
        if: inputs.mode == 'release' && inputs.ios_export_method == 'app-store-connect'
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
        run: |
          set -euo pipefail
          # altool searches for AuthKey_<KEY_ID>.p8 in ~/private_keys/
          mkdir -p ~/private_keys
          cp "$APPLE_API_KEY_PATH" ~/private_keys/AuthKey_${APPLE_API_KEY}.p8
          ipa_file=$(find alexandria/src-tauri/gen/apple/build -name '*.ipa' -type f | head -1)
          echo "Uploading ${ipa_file} to App Store Connect (TestFlight)..."
          xcrun altool --upload-app \
            --type ios \
            --file "$ipa_file" \
            --apiKey "$APPLE_API_KEY" \
            --apiIssuer "$APPLE_API_ISSUER"
          echo "TestFlight upload complete — build will appear after Apple processing (usually 5-15 minutes)"

  build-android:
    name: Build Android
    needs: prepare
    if: inputs.include_android == true
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RUSTUP_HOME: /mnt/rustup
      CARGO_HOME: /mnt/cargo
      CARGO_TARGET_DIR: /mnt/target
      TMPDIR: /mnt/tmp
      GRADLE_USER_HOME: /mnt/gradle
    steps:
      - name: Free Linux disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Prepare /mnt directories
        run: |
          sudo mkdir -p /mnt/rustup /mnt/cargo /mnt/target /mnt/tmp /mnt/gradle
          sudo chown -R "$(id -un):$(id -gn)" /mnt/rustup /mnt/cargo /mnt/target /mnt/tmp /mnt/gradle
          chmod 1777 /mnt/tmp

      - name: Checkout alexandria
        uses: actions/checkout@v5
        with:
          path: alexandria
          ref: ${{ env.BUILD_REF }}

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v5
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install CMake
        run: |
          sudo env TMPDIR="$TMPDIR" apt-get update
          sudo env TMPDIR="$TMPDIR" apt-get install -y cmake

      - name: Use preinstalled Android NDK
        run: |
          NDK_DIR="$(find "$ANDROID_SDK_ROOT/ndk" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -1)"
          if [ -z "$NDK_DIR" ]; then
            echo "No Android NDK installation was found under $ANDROID_SDK_ROOT/ndk." >&2
            exit 1
          fi
          SYSROOT_DIR="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          if [ ! -d "$SYSROOT_DIR" ]; then
            echo "Android NDK sysroot was not found at $SYSROOT_DIR." >&2
            exit 1
          fi
          echo "Using Android NDK at $NDK_DIR"
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$NDK_DIR" >> $GITHUB_ENV
          echo "NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
          echo "CARGO_NDK_SYSROOT_PATH=$SYSROOT_DIR" >> $GITHUB_ENV
          echo "SYSROOT=$SYSROOT_DIR" >> $GITHUB_ENV

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          targets: aarch64-linux-android

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: alexandria/src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: alexandria/package-lock.json

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Sync release version from tag
        working-directory: alexandria
        run: node scripts/prepare-tauri-config.mjs sync-version "${RELEASE_TAG}"

      - name: Install Tauri CLI
        working-directory: alexandria
        run: npm install --no-save @tauri-apps/cli@${TAURI_CLI_VERSION}

      - name: Create cargo-tauri shim for Android Gradle tasks
        run: |
          SHIM_DIR="$RUNNER_TEMP/tauri-cargo-shim"
          mkdir -p "$SHIM_DIR"
          cat > "$SHIM_DIR/cargo-tauri" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          if [ "\${1:-}" = "tauri" ]; then
            shift
          fi
          exec "$GITHUB_WORKSPACE/alexandria/node_modules/.bin/tauri" "\$@"
          EOF
          chmod +x "$SHIM_DIR/cargo-tauri"
          echo "$SHIM_DIR" >> $GITHUB_PATH

      - name: Verify Android Tauri CLI availability
        working-directory: alexandria
        run: |
          test -x node_modules/.bin/tauri
          ./node_modules/.bin/tauri --version
          cargo-tauri --version
          npx tauri --version

      - name: Decode Android keystore
        if: needs.prepare.outputs.android_signing_mode == 'secret'
        run: echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > $RUNNER_TEMP/release.jks

      - name: Create secret keystore.properties
        if: needs.prepare.outputs.android_signing_mode == 'secret'
        run: |
          cat > alexandria/src-tauri/gen/android/keystore.properties <<EOF
          password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=${{ runner.temp }}/release.jks
          EOF

      - name: Create temporary Android validation keystore
        if: needs.prepare.outputs.android_signing_mode == 'validation'
        run: |
          VALIDATION_KEYSTORE="$RUNNER_TEMP/validation-release.jks"
          keytool -genkeypair \
            -alias validation \
            -keystore "$VALIDATION_KEYSTORE" \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=Alexandria Validation, OU=CI, O=Alexandria, L=CI, S=CI, C=US"
          cat > alexandria/src-tauri/gen/android/keystore.properties <<EOF
          password=android
          keyAlias=validation
          storeFile=$VALIDATION_KEYSTORE
          EOF

      - name: Create temporary Android release keystore
        if: needs.prepare.outputs.android_signing_mode == 'temporary'
        run: |
          RELEASE_KEYSTORE="$RUNNER_TEMP/release.jks"
          keytool -genkeypair \
            -alias release \
            -keystore "$RELEASE_KEYSTORE" \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=Alexandria Release CI, OU=CI, O=Alexandria, L=CI, S=CI, C=US"
          cat > alexandria/src-tauri/gen/android/keystore.properties <<EOF
          password=android
          keyAlias=release
          storeFile=$RELEASE_KEYSTORE
          EOF

      - name: Set Android API 28 toolchain
        run: |
          NDK_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          ANDROID_CC="$NDK_BIN/aarch64-linux-android28-clang"
          ANDROID_NM="$NDK_BIN/llvm-nm"
          ANDROID_CFLAGS="--sysroot=$CARGO_NDK_SYSROOT_PATH"
          SHIM_DIR="$RUNNER_TEMP/android-ndk-bin"
          mkdir -p "$SHIM_DIR"
          ln -sf "$NDK_BIN/llvm-ar" "$SHIM_DIR/aarch64-linux-android-ar"
          ln -sf "$NDK_BIN/llvm-ranlib" "$SHIM_DIR/aarch64-linux-android-ranlib"
          ln -sf "$NDK_BIN/llvm-strip" "$SHIM_DIR/aarch64-linux-android-strip"
          ln -sf "$NDK_BIN/llvm-nm" "$SHIM_DIR/aarch64-linux-android-nm"
          echo "ANDROID_NDK_SHIM_DIR=$SHIM_DIR" >> $GITHUB_ENV
          echo "$SHIM_DIR" >> $GITHUB_PATH
          echo "ANDROID_AARCH64_CC=$ANDROID_CC" >> $GITHUB_ENV
          echo "ANDROID_AARCH64_NM=$ANDROID_NM" >> $GITHUB_ENV
          echo "ANDROID_AARCH64_CFLAGS=$ANDROID_CFLAGS" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ANDROID_CC" >> $GITHUB_ENV
          echo "CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=$NDK_BIN/armv7a-linux-androideabi28-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_I686_LINUX_ANDROID_LINKER=$NDK_BIN/i686-linux-android28-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER=$NDK_BIN/x86_64-linux-android28-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_AR=$NDK_BIN/llvm-ar" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_RANLIB=$NDK_BIN/llvm-ranlib" >> $GITHUB_ENV
          echo "NM=$ANDROID_NM" >> $GITHUB_ENV
          echo "NM_aarch64-linux-android=$ANDROID_NM" >> $GITHUB_ENV
          echo "NM_aarch64_linux_android=$ANDROID_NM" >> $GITHUB_ENV
          echo "CC_aarch64-linux-android=$ANDROID_CC" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=$ANDROID_CC" >> $GITHUB_ENV
          echo "CFLAGS_aarch64-linux-android=$ANDROID_CFLAGS" >> $GITHUB_ENV
          echo "CFLAGS_aarch64_linux_android=$ANDROID_CFLAGS" >> $GITHUB_ENV
          echo "ANDROID_NDK_AR=$NDK_BIN/llvm-ar" >> $GITHUB_ENV
          echo "ANDROID_NDK_RANLIB=$NDK_BIN/llvm-ranlib" >> $GITHUB_ENV
          echo "ANDROID_NDK_STRIP=$NDK_BIN/llvm-strip" >> $GITHUB_ENV

      - name: Build Android artifacts
        working-directory: alexandria
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_ROOT }}
          NDK_HOME: ${{ env.NDK_HOME }}
          CARGO_NDK_SYSROOT_PATH: ${{ env.CARGO_NDK_SYSROOT_PATH }}
          SYSROOT: ${{ env.SYSROOT }}
          AR: ${{ env.ANDROID_NDK_AR }}
          RANLIB: ${{ env.ANDROID_NDK_RANLIB }}
          STRIP: ${{ env.ANDROID_NDK_STRIP }}
          NM: ${{ env.ANDROID_AARCH64_NM }}
          NM_aarch64-linux-android: ${{ env.ANDROID_AARCH64_NM }}
          NM_aarch64_linux_android: ${{ env.ANDROID_AARCH64_NM }}
          TARGET_CC: ${{ env.ANDROID_AARCH64_CC }}
          TARGET_CFLAGS: ${{ env.ANDROID_AARCH64_CFLAGS }}
          CC_aarch64_linux_android: ${{ env.ANDROID_AARCH64_CC }}
          CC_aarch64-linux-android: ${{ env.ANDROID_AARCH64_CC }}
          CFLAGS_aarch64_linux_android: ${{ env.ANDROID_AARCH64_CFLAGS }}
          CFLAGS_aarch64-linux-android: ${{ env.ANDROID_AARCH64_CFLAGS }}
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ env.ANDROID_AARCH64_CC }}
          CARGO_TARGET_AARCH64_LINUX_ANDROID_AR: ${{ env.ANDROID_NDK_AR }}
          CARGO_TARGET_AARCH64_LINUX_ANDROID_RANLIB: ${{ env.ANDROID_NDK_RANLIB }}
        run: |
          export PATH="${ANDROID_NDK_SHIM_DIR}:$PATH"
          env \
            "CARGO_NDK_SYSROOT_PATH=${CARGO_NDK_SYSROOT_PATH}" \
            "SYSROOT=${SYSROOT}" \
            "NM=${ANDROID_AARCH64_NM}" \
            "NM_aarch64_linux_android=${ANDROID_AARCH64_NM}" \
            "NM_aarch64-linux-android=${ANDROID_AARCH64_NM}" \
            "CC_aarch64_linux_android=${ANDROID_AARCH64_CC}" \
            "CC_aarch64-linux-android=${ANDROID_AARCH64_CC}" \
            "CFLAGS_aarch64_linux_android=${ANDROID_AARCH64_CFLAGS}" \
            "CFLAGS_aarch64-linux-android=${ANDROID_AARCH64_CFLAGS}" \
            npx tauri android build --target aarch64 --config src-tauri/tauri.android.conf.json

      - name: Upload Android validation artifacts
        if: inputs.mode == 'validate'
        uses: actions/upload-artifact@v6
        with:
          name: mobile-android
          path: |
            alexandria/src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            alexandria/src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
          if-no-files-found: error

      - name: Upload Android release artifacts
        if: inputs.mode == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          apk_file=$(find alexandria/src-tauri/gen/android/app/build/outputs/apk/universal/release -name '*.apk' -type f | head -1)
          aab_file=$(find alexandria/src-tauri/gen/android/app/build/outputs/bundle/universalRelease -name '*.aab' -type f | head -1)
          [ -n "$apk_file" ] && cp "$apk_file" "/tmp/Alexandria-${VERSION}-Android.apk"
          [ -n "$aab_file" ] && cp "$aab_file" "/tmp/Alexandria-${VERSION}-Android.aab"
          gh release upload "${RELEASE_TAG}" \
            "/tmp/Alexandria-${VERSION}-Android.apk" \
            "/tmp/Alexandria-${VERSION}-Android.aab" \
            --clobber \
            --repo "${GITHUB_REPOSITORY}"

      - name: Upload to Google Play (internal testing)
        if: inputs.mode == 'release' && needs.prepare.outputs.android_signing_mode == 'secret'
        uses: r0adkll/upload-google-play@v1
        continue-on-error: true
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: org.alexandria.node
          releaseFiles: alexandria/src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
          track: internal
          status: completed
