name: CI

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'cli/**'
      - 'patches/**'
      - 'scripts/**'
      - 'src-tauri/**'
      - 'src-tauri/tauri*.json'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'package.json'
      - 'package-lock.json'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'cli/**'
      - 'patches/**'
      - 'scripts/**'
      - 'src-tauri/**'
      - 'src-tauri/tauri*.json'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'package.json'
      - 'package-lock.json'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout alexandria
        uses: actions/checkout@v4
        with:
          path: alexandria

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v4
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Install Linux system dependencies
        run: |
          sudo add-apt-repository universe -y
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libclang-dev \
            nasm \
            pkg-config \
            libv4l-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libpipewire-0.3-dev \
            libdbus-1-dev \
            libopus-dev \
            libssl-dev \
            libx264-dev \
            libva-dev \
            libdrm-dev \
            libvdpau-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: alexandria/package-lock.json

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'alexandria/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Check Rust formatting
        working-directory: alexandria
        run: cargo fmt --check

      - name: Run Clippy (lint)
        working-directory: alexandria
        run: cargo clippy --features tutoring-video-static -- -D warnings

      - name: Run Rust tests
        working-directory: alexandria
        run: cargo test --features tutoring-video-static

      - name: TypeScript type-check
        working-directory: alexandria
        run: npx vue-tsc -b --noEmit

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: alexandria

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        working-directory: alexandria/src-tauri
        run: cargo audit

      - name: Check updater key is not placeholder
        working-directory: alexandria
        run: |
          if grep -q 'PLACEHOLDER_PUBKEY' src-tauri/tauri.conf.json; then
            echo "::warning::Updater public key is still a placeholder — replace before release"
          fi
