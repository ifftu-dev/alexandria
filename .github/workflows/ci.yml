name: CI

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'cli/**'
      - 'patches/**'
      - 'scripts/**'
      - 'src-tauri/**'
      - 'src-tauri/tauri*.json'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'package.json'
      - 'package-lock.json'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'cli/**'
      - 'patches/**'
      - 'scripts/**'
      - 'src-tauri/**'
      - 'src-tauri/tauri*.json'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'package.json'
      - 'package-lock.json'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect changed surfaces
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      frontend: ${{ steps.detect.outputs.frontend }}
      security: ${{ steps.detect.outputs.security }}
      release: ${{ steps.detect.outputs.release }}
    steps:
      - name: Checkout alexandria
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          EMPTY_TREE="$(git hash-object -t tree /dev/null)"
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"

          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="${EMPTY_TREE}"
          fi

          mapfile -t changed_files < <(git diff --name-only "${BASE_SHA}" "${GITHUB_SHA}")

          matches_any() {
            local path
            for path in "${changed_files[@]}"; do
              case "${path}" in
                .github/workflows/*|cli/*|patches/*|scripts/*|src-tauri/*|Cargo.toml|Cargo.lock)
                  if [ "$1" = "backend" ] || [ "$1" = "security" ]; then
                    return 0
                  fi
                  ;;
                src/*|package.json|package-lock.json|index.html|vite.config.ts|tsconfig*.json)
                  if [ "$1" = "frontend" ]; then
                    return 0
                  fi
                  ;;
              esac
            done
            return 1
          }

          for surface in backend frontend security; do
            if matches_any "${surface}"; then
              echo "${surface}=true" >> "${GITHUB_OUTPUT}"
            else
              echo "${surface}=false" >> "${GITHUB_OUTPUT}"
            fi
          done

          if printf '%s\n' "${changed_files[@]}" | grep -Eq \
            '^(\.github/workflows/((release|validate)-|desktop-shared\.yml|mobile-shared\.yml)|\.github/workflows/ci\.yml|scripts/|src-tauri/tauri.*\.json|src-tauri/Cargo\.toml|src-tauri/src/commands/mod\.rs|src-tauri/src/commands/tutoring_stubs\.rs|src-tauri/src/tutoring/manager_android\.rs|package\.json|package-lock\.json)$'; then
            echo "release=true" >> "${GITHUB_OUTPUT}"
          else
            echo "release=false" >> "${GITHUB_OUTPUT}"
          fi

  check:
    name: Lint & Test
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      RUSTUP_HOME: /mnt/rustup
      CARGO_HOME: /mnt/cargo
      CARGO_TARGET_DIR: /mnt/target
      TMPDIR: /mnt/tmp

    steps:
      - name: Free Linux disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Prepare /mnt directories
        run: |
          sudo mkdir -p /mnt/rustup /mnt/cargo /mnt/target /mnt/tmp
          sudo chown -R "$(id -un):$(id -gn)" /mnt/rustup /mnt/cargo /mnt/target /mnt/tmp
          chmod 1777 /mnt/tmp

      - name: Checkout alexandria
        uses: actions/checkout@v5
        with:
          path: alexandria

      - name: Checkout iroh-live-patched
        if: needs.changes.outputs.backend == 'true'
        uses: actions/checkout@v5
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Install Linux system dependencies
        if: needs.changes.outputs.backend == 'true'
        run: |
          sudo add-apt-repository universe -y
          sudo env TMPDIR="$TMPDIR" apt-get update
          sudo env TMPDIR="$TMPDIR" apt-get install -y --no-install-recommends \
            cmake \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libclang-dev \
            nasm \
            pkg-config \
            libv4l-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libpipewire-0.3-dev \
            libdbus-1-dev \
            libopus-dev \
            libssl-dev \
            libx264-dev \
            libva-dev \
            libgbm-dev \
            libdrm-dev \
            libvdpau-dev

      - name: Setup Node.js
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: alexandria/package-lock.json

      - name: Setup Rust 1.83.0 (MSRV)
        if: needs.changes.outputs.backend == 'true'
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        if: needs.changes.outputs.backend == 'true'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'alexandria/src-tauri -> target'

      - name: Install frontend dependencies
        if: needs.changes.outputs.frontend == 'true'
        working-directory: alexandria
        run: npm ci

      - name: Check Rust formatting
        if: needs.changes.outputs.backend == 'true'
        working-directory: alexandria
        run: cargo fmt --check

      - name: Run Clippy (lint)
        if: needs.changes.outputs.backend == 'true'
        working-directory: alexandria
        run: cargo clippy --features tutoring-video-static -- -D warnings

      - name: Run Rust tests
        if: needs.changes.outputs.backend == 'true'
        working-directory: alexandria
        run: cargo test --features tutoring-video-static

      - name: TypeScript type-check
        if: needs.changes.outputs.frontend == 'true'
        working-directory: alexandria
        run: npx vue-tsc -b --noEmit

  release-readiness:
    name: Release Readiness
    needs: changes
    if: needs.changes.outputs.release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout alexandria
        uses: actions/checkout@v5
        with:
          path: alexandria

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Check release readiness
        working-directory: alexandria
        run: node scripts/check-release-readiness.mjs

  security:
    name: Security Audit
    needs: changes
    if: needs.changes.outputs.security == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout alexandria
        uses: actions/checkout@v5
        with:
          path: alexandria

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v5
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        working-directory: alexandria
        run: cargo audit --file Cargo.lock

      - name: Check updater key is not placeholder
        working-directory: alexandria
        run: |
          if grep -q 'PLACEHOLDER_PUBKEY' src-tauri/tauri.conf.json; then
            echo "::warning::Updater public key is still a placeholder — replace before release"
          fi
