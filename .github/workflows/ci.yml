name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'cli/**'
      - 'crates/**'
      - 'patches/**'
      - 'scripts/**'
      - 'src-tauri/**'
      - 'src-tauri/tauri*.json'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'package.json'
      - 'package-lock.json'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'cli/**'
      - 'crates/**'
      - 'patches/**'
      - 'scripts/**'
      - 'src-tauri/**'
      - 'src-tauri/tauri*.json'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'package.json'
      - 'package-lock.json'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect changed surfaces
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      frontend: ${{ steps.detect.outputs.frontend }}
      security: ${{ steps.detect.outputs.security }}
      release: ${{ steps.detect.outputs.release }}
    steps:
      - name: Checkout alexandria
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          EMPTY_TREE="$(git hash-object -t tree /dev/null)"
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"

          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="${EMPTY_TREE}"
          fi

          mapfile -t changed_files < <(git diff --name-only "${BASE_SHA}" "${GITHUB_SHA}")

          matches_any() {
            local path
            for path in "${changed_files[@]}"; do
              case "${path}" in
                .github/workflows/*|cli/*|patches/*|scripts/*|src-tauri/*|Cargo.toml|Cargo.lock)
                  if [ "$1" = "backend" ] || [ "$1" = "security" ]; then
                    return 0
                  fi
                  ;;
                src/*|package.json|package-lock.json|index.html|vite.config.ts|tsconfig*.json)
                  if [ "$1" = "frontend" ]; then
                    return 0
                  fi
                  ;;
              esac
            done
            return 1
          }

          for surface in backend frontend security; do
            if matches_any "${surface}"; then
              echo "${surface}=true" >> "${GITHUB_OUTPUT}"
            else
              echo "${surface}=false" >> "${GITHUB_OUTPUT}"
            fi
          done

          if printf '%s\n' "${changed_files[@]}" | grep -Eq \
            '^(\.github/workflows/((release|validate)-|desktop-shared\.yml|mobile-shared\.yml)|\.github/workflows/ci\.yml|scripts/|src-tauri/tauri.*\.json|src-tauri/Cargo\.toml|src-tauri/src/commands/mod\.rs|src-tauri/src/commands/tutoring_stubs\.rs|src-tauri/src/tutoring/manager_android\.rs|package\.json|package-lock\.json)$'; then
            echo "release=true" >> "${GITHUB_OUTPUT}"
          else
            echo "release=false" >> "${GITHUB_OUTPUT}"
          fi

  check:
    name: Lint & Test
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      RUSTUP_HOME: /mnt/rustup
      CARGO_HOME: /mnt/cargo
      CARGO_TARGET_DIR: /mnt/target
      TMPDIR: /mnt/tmp

    steps:
      - name: Free Linux disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Prepare /mnt directories
        run: |
          sudo mkdir -p /mnt/rustup /mnt/cargo /mnt/target /mnt/tmp
          sudo chown -R "$(id -un):$(id -gn)" /mnt/rustup /mnt/cargo /mnt/target /mnt/tmp
          chmod 1777 /mnt/tmp

      - name: Checkout alexandria
        uses: actions/checkout@v5
        with:
          path: alexandria

      - name: Checkout iroh-live-patched
        if: needs.changes.outputs.backend == 'true'
        uses: actions/checkout@v5
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Install Linux system dependencies
        if: needs.changes.outputs.backend == 'true'
        run: |
          sudo add-apt-repository universe -y
          sudo env TMPDIR="$TMPDIR" apt-get update
          sudo env TMPDIR="$TMPDIR" apt-get install -y --no-install-recommends \
            cmake \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libclang-dev \
            nasm \
            pkg-config \
            libv4l-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libpipewire-0.3-dev \
            libdbus-1-dev \
            libopus-dev \
            libssl-dev \
            libx264-dev \
            libva-dev \
            libgbm-dev \
            libdrm-dev \
            libvdpau-dev

      - name: Setup Node.js
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: alexandria/package-lock.json

      - name: Setup Rust 1.91.0 (MSRV)
        if: needs.changes.outputs.backend == 'true'
        uses: dtolnay/rust-toolchain@1.91.0
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        if: needs.changes.outputs.backend == 'true'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'alexandria/src-tauri -> target'

      - name: Install frontend dependencies
        if: needs.changes.outputs.frontend == 'true'
        working-directory: alexandria
        run: npm ci

      - name: Check Rust formatting
        if: needs.changes.outputs.backend == 'true'
        working-directory: alexandria
        run: cargo fmt --check

      - name: Run Clippy (lint)
        if: needs.changes.outputs.backend == 'true'
        working-directory: alexandria
        run: cargo clippy --features tutoring-video-static -- -D warnings

      - name: Run Rust tests
        if: needs.changes.outputs.backend == 'true'
        working-directory: alexandria
        # Linking the test binaries for this large workspace (wasmtime,
        # candle, tract-onnx, ffmpeg, libp2p, pallas, alexandria-node...)
        # exhausts the 16 GB runner and the VM is terminated (exit 143).
        # Drop test debuginfo (the bulk of link-time RAM and disk) and cap
        # concurrent link jobs to keep peak memory in budget.
        env:
          CARGO_PROFILE_TEST_DEBUG: "0"
          CARGO_BUILD_JOBS: "2"
        run: cargo test --features tutoring-video-static

      - name: Tauri command guard
        # Cross-checks lib.rs (backend) against invoke() sites (frontend), so
        # run whenever either surface changed. Pure Node, no npm deps needed.
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
        working-directory: alexandria
        run: node scripts/check-tauri-commands.mjs

      - name: TypeScript type-check
        if: needs.changes.outputs.frontend == 'true'
        working-directory: alexandria
        run: npx vue-tsc -b --noEmit

      - name: Frontend tests (vitest)
        if: needs.changes.outputs.frontend == 'true'
        working-directory: alexandria
        run: npm test

      - name: Sentinel model artifact integrity
        if: needs.changes.outputs.backend == 'true'
        working-directory: alexandria
        run: |
          set -euo pipefail
          cd src-tauri/resources/sentinel
          # Pinned lockfile. Embedded via `include_bytes!` into the
          # release binary by the sentinel module — any silent
          # corruption or accidental swap fails here loudly. Bump both
          # file + lockfile together when rolling a new bundled model.
          shasum -a 256 -c paste-v1.onnx.sha256

      - name: Sentinel synthetic golden hash
        if: needs.changes.outputs.backend == 'true'
        working-directory: alexandria
        run: |
          # The cli synth crate pins blake2b-512 hashes for SYNTH_VERSION=v1
          # at count=64, seed=42 per attack class (see
          # cli/src/synth/generators.rs `golden_hashes_match_synth_v1`).
          # Runs as part of `cargo test`, but call out explicitly so the
          # log surfaces it clearly.
          cargo test -p alex --quiet synth::generators::tests::golden_hashes_match_synth_v1

  # Type-check the mobile targets on every PR. `Lint & Test` runs on Linux
  # only, so `#[cfg(mobile)]` / `#[cfg(not(desktop))]` code is otherwise never
  # compiled until a release build — which is how the grader stub and the
  # stale wasmtime version comment both went unnoticed. This is compile-only:
  # no simulator, no signing, no bundling.
  mobile-check:
    name: Mobile Compile Check (${{ matrix.label }})
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: iOS
            os: macos-15
            target: aarch64-apple-ios
            features: tutoring-video-ios
          - label: Android
            os: ubuntu-latest
            target: aarch64-linux-android
            features: tutoring-video-android

    steps:
      - name: Checkout alexandria
        uses: actions/checkout@v5
        with:
          path: alexandria

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v5
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      # cargo check still runs build scripts, which compile C (e.g. the
      # SystemConfiguration stubs), so Android needs a working NDK toolchain
      # even though nothing is linked.
      - name: Use preinstalled Android NDK
        if: matrix.label == 'Android'
        run: |
          NDK_DIR="$(find "$ANDROID_SDK_ROOT/ndk" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -1)"
          if [ -z "$NDK_DIR" ]; then
            echo "No Android NDK installation was found under $ANDROID_SDK_ROOT/ndk." >&2
            exit 1
          fi
          SYSROOT_DIR="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          if [ ! -d "$SYSROOT_DIR" ]; then
            echo "Android NDK sysroot was not found at $SYSROOT_DIR." >&2
            exit 1
          fi
          NDK_BIN="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin"
          SHIM_DIR="$RUNNER_TEMP/android-ndk-bin"
          mkdir -p "$SHIM_DIR"
          ln -sf "$NDK_BIN/llvm-ar" "$SHIM_DIR/aarch64-linux-android-ar"
          ln -sf "$NDK_BIN/llvm-ranlib" "$SHIM_DIR/aarch64-linux-android-ranlib"
          ln -sf "$NDK_BIN/llvm-nm" "$SHIM_DIR/aarch64-linux-android-nm"
          {
            echo "ANDROID_NDK_HOME=$NDK_DIR"
            echo "ANDROID_NDK_ROOT=$NDK_DIR"
            echo "NDK_HOME=$NDK_DIR"
            echo "CARGO_NDK_SYSROOT_PATH=$SYSROOT_DIR"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$NDK_BIN/aarch64-linux-android28-clang"
            echo "CC_aarch64_linux_android=$NDK_BIN/aarch64-linux-android28-clang"
            echo "AR_aarch64_linux_android=$NDK_BIN/llvm-ar"
          } >> $GITHUB_ENV
          echo "$SHIM_DIR" >> $GITHUB_PATH

      - name: Install Android cmake dependency
        if: matrix.label == 'Android'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake

      - name: Setup Rust 1.91.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.91.0
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: alexandria -> target
          key: mobile-${{ matrix.target }}

      # Scoped to -p alexandria-node deliberately. A bare `cargo check` at the
      # workspace root also checks vendored members like patches/ffmpeg-sys-next,
      # whose build script needs a cross-compile pkg-config sysroot we have no
      # reason to set up for a type-check.
      - name: Type-check ${{ matrix.label }}
        working-directory: alexandria
        run: cargo check -p alexandria-node --target ${{ matrix.target }} --features ${{ matrix.features }}

  # Runtime proof that the WASM grader actually JIT-compiles and executes on
  # Android — the step `mobile-check` (compile-only) and desktop tests cannot
  # cover. Runs the existing headless grade-wiring test on an arm64 AVD via a
  # cargo target-runner that adb-pushes the cross-compiled test binary.
  #
  # v1 config: x86_64 host + emulated arm64-v8a AVD. The arm64 ABI is the point
  # (it's what users run, and what the JIT emits); the x86_64 host keeps the
  # proven linux-x86_64 NDK cross-compile path. Moving to an arm64 host
  # (ubuntu-22.04-arm) for KVM speed is a follow-up gated on the NDK shipping
  # linux-aarch64 host binaries (r27+).
  mobile-grader-test:
    name: Android grader (on-device)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Checkout alexandria
        uses: actions/checkout@v5
        with:
          path: alexandria

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v5
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Use preinstalled Android NDK
        run: |
          NDK_DIR="$(find "$ANDROID_SDK_ROOT/ndk" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -1)"
          SYSROOT_DIR="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          NDK_BIN="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin"
          SHIM_DIR="$RUNNER_TEMP/android-ndk-bin"
          mkdir -p "$SHIM_DIR"
          for t in ar ranlib nm strip; do ln -sf "$NDK_BIN/llvm-$t" "$SHIM_DIR/aarch64-linux-android-$t"; done
          {
            echo "ANDROID_NDK_HOME=$NDK_DIR"
            echo "CARGO_NDK_SYSROOT_PATH=$SYSROOT_DIR"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$NDK_BIN/aarch64-linux-android28-clang"
            echo "CC_aarch64_linux_android=$NDK_BIN/aarch64-linux-android28-clang"
            echo "AR_aarch64_linux_android=$NDK_BIN/llvm-ar"
          } >> $GITHUB_ENV
          echo "$SHIM_DIR" >> $GITHUB_PATH

      - name: Install cmake
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake

      - name: Setup Rust 1.91.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.91.0
        with:
          targets: aarch64-linux-android

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: alexandria -> target
          key: android-ondevice

      # Cross-compile the test binary now (host-side) so the emulator step only
      # pushes + runs — keeps the AVD alive for the minimum time.
      - name: Build grade-wiring test (no-run)
        working-directory: alexandria
        run: |
          cargo test -p alexandria-node --lib --no-run \
            --target aarch64-linux-android --features tutoring-video-android \
            plugins::builtins::tests::editor_js_install_to_grade_wiring

      - name: Run grade test on arm64 emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: arm64-v8a
          target: google_apis
          force-avd-creation: true
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect
          disable-animations: true
          script: |
            cd alexandria
            export CARGO_TARGET_AARCH64_LINUX_ANDROID_RUNNER="$GITHUB_WORKSPACE/alexandria/scripts/ci/android-test-runner.sh"
            cargo test -p alexandria-node --lib \
              --target aarch64-linux-android --features tutoring-video-android \
              plugins::builtins::tests::editor_js_install_to_grade_wiring -- --exact --nocapture

  release-readiness:
    name: Release Readiness
    needs: changes
    if: needs.changes.outputs.release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout alexandria
        uses: actions/checkout@v5
        with:
          path: alexandria

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Check release readiness
        working-directory: alexandria
        run: node scripts/check-release-readiness.mjs

  security:
    name: Security Audit
    needs: changes
    if: needs.changes.outputs.security == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout alexandria
        uses: actions/checkout@v5
        with:
          path: alexandria

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v5
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        working-directory: alexandria
        run: cargo audit --file Cargo.lock

      - name: Check updater key is not placeholder
        working-directory: alexandria
        run: |
          if grep -q 'PLACEHOLDER_PUBKEY' src-tauri/tauri.conf.json; then
            echo "::warning::Updater public key is still a placeholder — replace before release"
          fi
