name: Validate (Desktop)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Immutable tag to validate'
        required: true
        type: string
      include_linux:
        description: 'Validate Linux artifacts'
        required: false
        type: boolean
        default: true
      include_windows:
        description: 'Validate Windows artifacts'
        required: false
        type: boolean
        default: true
      include_macos:
        description: 'Validate macOS artifacts'
        required: false
        type: boolean
        default: false
      include_linux_arm64:
        description: 'Validate Linux ARM64 artifacts'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate-desktop:
    uses: ./.github/workflows/desktop-shared.yml
    with:
      mode: validate
      tag: ${{ inputs.tag }}
      sign_updater: false
      include_linux: ${{ inputs.include_linux }}
      include_windows: ${{ inputs.include_windows }}
      include_macos: ${{ inputs.include_macos }}
      include_linux_arm64: ${{ inputs.include_linux_arm64 }}
    secrets: inherit
