name: Verify Apple Certs (temp)

# Throwaway diagnostic on a macOS runner — mirrors the real signing path:
# decode each cert secret, `security import` into a keychain, and confirm the
# expected code-signing identity (cert + private key) is usable. This is the
# same tooling the release build uses, so it's authoritative (unlike Ubuntu
# OpenSSL, which can't always read Apple's p12 private-key encryption).
# Delete this workflow after use.

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - name: Import + verify Apple signing identities
        env:
          APPLE_MAC_CERTIFICATE: ${{ secrets.APPLE_MAC_CERTIFICATE }}
          APPLE_MAC_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_MAC_CERTIFICATE_PASSWORD }}
          APPLE_IOS_CERTIFICATE: ${{ secrets.APPLE_IOS_CERTIFICATE }}
          APPLE_IOS_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_IOS_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          set +e
          KC=verify.keychain
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KC"
          security default-keychain -s "$KC"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KC"

          import_one() {
            local name="$1" b64="$2" pw="$3"
            echo "=================================================="
            echo "### $name"
            if [ -z "$b64" ]; then echo "  FAIL: secret empty"; return 1; fi
            echo "$b64" | base64 --decode > c.p12 2>/dev/null || { echo "  FAIL: bad base64"; return 1; }
            echo "  p12 size: $(wc -c < c.p12) bytes"
            if security import c.p12 -k "$KC" -P "$pw" -T /usr/bin/codesign 2>import.err; then
              echo "  security import: OK"
            else
              echo "  FAIL: security import — $(cat import.err)"
              rm -f c.p12; return 1
            fi
            rm -f c.p12
          }

          rc=0
          import_one "APPLE_MAC_CERTIFICATE (Developer ID Application)" "$APPLE_MAC_CERTIFICATE" "$APPLE_MAC_CERTIFICATE_PASSWORD" || rc=1
          import_one "APPLE_IOS_CERTIFICATE (Apple Distribution)" "$APPLE_IOS_CERTIFICATE" "$APPLE_IOS_CERTIFICATE_PASSWORD" || rc=1

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_KEYCHAIN_PASSWORD" "$KC" >/dev/null 2>&1

          echo "=================================================="
          echo "### Usable code-signing identities (cert + private key):"
          security find-identity -v -p codesigning "$KC" | sed 's/^/  /'

          echo "=================================================="
          ids=$(security find-identity -v -p codesigning "$KC")
          echo "$ids" | grep -q "Developer ID Application" && echo "MAC identity: PRESENT ✅" || { echo "MAC identity: MISSING ❌"; rc=1; }
          echo "$ids" | grep -q "Apple Distribution"        && echo "iOS identity: PRESENT ✅" || { echo "iOS identity: MISSING ❌"; rc=1; }

          echo "=================================================="
          [ "$rc" -eq 0 ] && echo "RESULT: ALL GOOD ✅" || echo "RESULT: PROBLEMS FOUND ❌"
          security delete-keychain "$KC" >/dev/null 2>&1
          exit $rc
