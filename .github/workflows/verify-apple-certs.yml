name: Verify Apple Certs (temp)

# Throwaway diagnostic: confirms each Apple cert secret holds the right cert
# type AND a private key, and that the shared API/keychain secrets are present.
# Prints only public info (cert subject) — no private key material is emitted.
# Delete this workflow after use.

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect Apple secrets
        env:
          APPLE_MAC_CERTIFICATE: ${{ secrets.APPLE_MAC_CERTIFICATE }}
          APPLE_MAC_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_MAC_CERTIFICATE_PASSWORD }}
          APPLE_MAC_SIGNING_IDENTITY: ${{ secrets.APPLE_MAC_SIGNING_IDENTITY }}
          APPLE_IOS_CERTIFICATE: ${{ secrets.APPLE_IOS_CERTIFICATE }}
          APPLE_IOS_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_IOS_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          fail=0
          check_cert() {
            local name="$1" b64="$2" pw="$3" want="$4"
            echo "==================================================="
            echo "### $name  (expect: $want)"
            if [ -z "$b64" ]; then echo "  FAIL: empty"; fail=1; return; fi
            if ! printf '%s' "$b64" | base64 -d > c.p12 2>/dev/null; then
              echo "  FAIL: not valid base64"; fail=1; return
            fi
            local subj keys
            subj=$(openssl pkcs12 -in c.p12 -nokeys -passin pass:"$pw" -legacy 2>/dev/null | openssl x509 -noout -subject 2>/dev/null || true)
            if [ -z "$subj" ]; then echo "  FAIL: password wrong or p12 unreadable"; fail=1; rm -f c.p12; return; fi
            keys=$(openssl pkcs12 -in c.p12 -nocerts -passin pass:"$pw" -legacy 2>/dev/null | grep -c "PRIVATE KEY" || true)
            echo "  $subj"
            openssl pkcs12 -in c.p12 -nokeys -passin pass:"$pw" -legacy 2>/dev/null | openssl x509 -noout -enddate 2>/dev/null | sed 's/^/  /'
            echo "  private keys: $keys"
            if ! echo "$subj" | grep -q "$want"; then echo "  FAIL: wrong cert type (expected '$want')"; fail=1; fi
            if [ "$keys" -lt 1 ]; then echo "  FAIL: NO private key — cannot sign"; fail=1; fi
            [ "$keys" -ge 1 ] && echo "$subj" | grep -q "$want" && echo "  OK"
            rm -f c.p12
          }
          check_cert "APPLE_MAC_CERTIFICATE" "$APPLE_MAC_CERTIFICATE" "$APPLE_MAC_CERTIFICATE_PASSWORD" "Developer ID Application"
          check_cert "APPLE_IOS_CERTIFICATE" "$APPLE_IOS_CERTIFICATE" "$APPLE_IOS_CERTIFICATE_PASSWORD" "Apple Distribution"

          echo "==================================================="
          echo "### shared / non-cert secrets"
          echo "  APPLE_MAC_SIGNING_IDENTITY: ${APPLE_MAC_SIGNING_IDENTITY:-<empty>}"
          echo "  APPLE_API_KEY_ID present: $([ -n "$APPLE_API_KEY_ID" ] && echo yes || echo NO)"
          echo "  APPLE_API_ISSUER_ID present: $([ -n "$APPLE_API_ISSUER_ID" ] && echo yes || echo NO)"
          echo "  APPLE_KEYCHAIN_PASSWORD present: $([ -n "$APPLE_KEYCHAIN_PASSWORD" ] && echo yes || echo NO)"
          if printf '%s' "$APPLE_API_KEY_P8" | grep -q "PRIVATE KEY"; then
            echo "  APPLE_API_KEY_P8: looks like a valid .p8 (contains PRIVATE KEY)"
          else
            echo "  APPLE_API_KEY_P8: WARNING — does not contain 'PRIVATE KEY' (is it the raw .p8 contents?)"
          fi
          [ -z "$APPLE_API_KEY_ID" ] && fail=1
          [ -z "$APPLE_API_ISSUER_ID" ] && fail=1
          [ -z "$APPLE_KEYCHAIN_PASSWORD" ] && fail=1
          [ -z "$APPLE_MAC_SIGNING_IDENTITY" ] && fail=1

          echo "==================================================="
          if [ "$fail" -eq 0 ]; then echo "RESULT: ALL GOOD ✅"; else echo "RESULT: PROBLEMS FOUND ❌ (see FAIL lines)"; exit 1; fi
