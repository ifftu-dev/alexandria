name: Validate (Mobile)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Immutable tag to validate'
        required: true
        type: string
      include_android:
        description: 'Validate Android artifacts'
        required: false
        type: boolean
        default: true
      include_ios:
        description: 'Validate iOS artifacts'
        required: false
        type: boolean
        default: false
      ios_export_method:
        description: 'iOS export mode for validation'
        required: false
        type: choice
        default: debugging
        options:
          - debugging
          - release-testing
          - app-store-connect

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TAURI_CLI_VERSION: 2.10.0
  RELEASE_TAG: ${{ inputs.tag }}
  BUILD_REF: ${{ format('refs/tags/{0}', inputs.tag) }}

concurrency:
  group: validate-mobile-${{ inputs.tag }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Mobile preflight
    runs-on: ubuntu-latest
    steps:
      - name: Ensure a release tag is available
        run: |
          if [ -z "${RELEASE_TAG}" ]; then
            echo "A tag is required for mobile validation runs." >&2
            exit 1
          fi

      - name: Validate tag exists on GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" \
            >/dev/null; then
            echo "Tag ${RELEASE_TAG} does not exist on ${GITHUB_REPOSITORY}." >&2
            exit 1
          fi

      - name: Validate Apple export secrets
        if: inputs.include_ios == true && inputs.ios_export_method != 'debugging'
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          for secret_name in APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_CONTENT; do
            if [ -z "$(printenv "${secret_name}")" ]; then
              echo "${secret_name} is required for signed iOS exports." >&2
              exit 1
            fi
          done

  build-ios:
    name: Build iOS
    needs: preflight
    if: inputs.include_ios == true
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout alexandria
        uses: actions/checkout@v5
        with:
          path: alexandria
          ref: ${{ env.BUILD_REF }}

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v5
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: alexandria/src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: alexandria/package-lock.json

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Install CMake
        run: brew install cmake

      - name: Install Tauri CLI
        working-directory: alexandria
        run: npm install --no-save @tauri-apps/cli@${TAURI_CLI_VERSION}

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-tauri fallback
        run: cargo binstall tauri-cli --version ${TAURI_CLI_VERSION} --no-confirm --locked

      - name: Export Cargo bin to PATH for downstream iOS tooling
        run: echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> $GITHUB_PATH

      - name: Verify repo-local Tauri CLI
        working-directory: alexandria
        run: |
          test -x node_modules/.bin/tauri
          ./node_modules/.bin/tauri --version

      - name: Write Apple API Key
        if: inputs.ios_export_method != 'debugging'
        run: echo "${{ secrets.APPLE_API_KEY_CONTENT }}" > $RUNNER_TEMP/AuthKey.p8

      - name: Build iOS validation artifacts
        working-directory: alexandria
        env:
          IOS_EXPORT_METHOD: ${{ inputs.ios_export_method }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
        run: |
          if [ "${IOS_EXPORT_METHOD}" = "debugging" ]; then
            npx tauri ios build --config src-tauri/tauri.ios.conf.json --target aarch64-sim
          else
            npx tauri ios build --config src-tauri/tauri.ios.conf.json --export-method "${IOS_EXPORT_METHOD}"
          fi

      - name: Upload iOS validation artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mobile-ios
          path: alexandria/src-tauri/gen/apple/build/**/*
          if-no-files-found: error

  build-android:
    name: Build Android
    needs: preflight
    if: inputs.include_android == true
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout alexandria
        uses: actions/checkout@v5
        with:
          path: alexandria
          ref: ${{ env.BUILD_REF }}

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v5
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          targets: aarch64-linux-android

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: alexandria/src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: alexandria/package-lock.json

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Install Tauri CLI
        working-directory: alexandria
        run: npm install --no-save @tauri-apps/cli@${TAURI_CLI_VERSION}

      - name: Create cargo-tauri shim for Android Gradle tasks
        run: |
          SHIM_DIR="$RUNNER_TEMP/tauri-cargo-shim"
          mkdir -p "$SHIM_DIR"
          cat > "$SHIM_DIR/cargo-tauri" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          if [ "\${1:-}" = "tauri" ]; then
            shift
          fi
          exec "$GITHUB_WORKSPACE/alexandria/node_modules/.bin/tauri" "\$@"
          EOF
          chmod +x "$SHIM_DIR/cargo-tauri"
          echo "$SHIM_DIR" >> $GITHUB_PATH

      - name: Verify Android Tauri CLI availability
        working-directory: alexandria
        run: |
          test -x node_modules/.bin/tauri
          ./node_modules/.bin/tauri --version
          cargo-tauri --version
          npx tauri --version

      - name: Set Android API 28 toolchain
        run: |
          NDK_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          SHIM_DIR="$RUNNER_TEMP/android-ndk-bin"
          mkdir -p "$SHIM_DIR"
          ln -sf "$NDK_BIN/llvm-ar" "$SHIM_DIR/aarch64-linux-android-ar"
          ln -sf "$NDK_BIN/llvm-ranlib" "$SHIM_DIR/aarch64-linux-android-ranlib"
          ln -sf "$NDK_BIN/llvm-strip" "$SHIM_DIR/aarch64-linux-android-strip"
          echo "$SHIM_DIR" >> $GITHUB_PATH
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$NDK_BIN/aarch64-linux-android28-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=$NDK_BIN/armv7a-linux-androideabi28-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_I686_LINUX_ANDROID_LINKER=$NDK_BIN/i686-linux-android28-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER=$NDK_BIN/x86_64-linux-android28-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_AR=$NDK_BIN/llvm-ar" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_RANLIB=$NDK_BIN/llvm-ranlib" >> $GITHUB_ENV
          echo "ANDROID_NDK_AR=$NDK_BIN/llvm-ar" >> $GITHUB_ENV
          echo "ANDROID_NDK_RANLIB=$NDK_BIN/llvm-ranlib" >> $GITHUB_ENV
          echo "ANDROID_NDK_STRIP=$NDK_BIN/llvm-strip" >> $GITHUB_ENV

      - name: Build Android artifacts
        working-directory: alexandria
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_ROOT }}
          NDK_HOME: ${{ env.NDK_HOME }}
          AR: ${{ env.ANDROID_NDK_AR }}
          RANLIB: ${{ env.ANDROID_NDK_RANLIB }}
          STRIP: ${{ env.ANDROID_NDK_STRIP }}
        run: npx tauri android build --debug --config src-tauri/tauri.android.conf.json

      - name: Upload Android validation artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mobile-android
          path: alexandria/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
