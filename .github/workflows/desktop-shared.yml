name: Desktop Build (Shared)

on:
  workflow_call:
    inputs:
      mode:
        required: true
        type: string
      tag:
        required: true
        type: string
      sign_updater:
        required: false
        type: boolean
        default: false
      include_linux:
        required: false
        type: boolean
        default: true
      include_windows:
        required: false
        type: boolean
        default: true
      include_macos:
        required: false
        type: boolean
        default: true
      include_linux_arm64:
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TAURI_CLI_VERSION: 2.10.0
  RELEASE_TAG: ${{ inputs.tag }}
  BUILD_REF: ${{ format('refs/tags/{0}', inputs.tag) }}

concurrency:
  group: desktop-${{ inputs.mode }}-${{ inputs.tag }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Desktop preflight
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - name: Ensure a release tag is available
        run: |
          if [ -z "${RELEASE_TAG}" ]; then
            echo "A tag is required." >&2
            exit 1
          fi

      - name: Validate tag exists on GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" \
            >/dev/null; then
            echo "Tag ${RELEASE_TAG} does not exist on ${GITHUB_REPOSITORY}." >&2
            exit 1
          fi

      - name: Setup Node.js for updater signing preflight
        if: inputs.mode == 'release' && inputs.sign_updater == true
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Validate updater signing key
        if: inputs.mode == 'release' && inputs.sign_updater == true
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required for signed desktop releases." >&2
            exit 1
          fi

          printf 'alexandria updater signing preflight\n' > "${RUNNER_TEMP}/updater-signing.txt"
          npx -y @tauri-apps/cli@${TAURI_CLI_VERSION} signer sign "${RUNNER_TEMP}/updater-signing.txt" >/dev/null
          rm -f "${RUNNER_TEMP}/updater-signing.txt" "${RUNNER_TEMP}/updater-signing.txt.sig"

      - name: Create or reuse draft release
        if: inputs.mode == 'release'
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Alexandria ${RELEASE_TAG}" \
              --draft
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Alexandria ${RELEASE_TAG}" \
              --draft \
              --verify-tag \
              --notes ""
          fi

          release_json=""
          for attempt in $(seq 1 10); do
            release_json=$(
              gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate |
                jq -cs --arg tag "${RELEASE_TAG}" \
                  'add | map(select(.tag_name == $tag)) | first // empty'
            )

            if [ -n "${release_json}" ]; then
              break
            fi

            sleep 2
          done

          if [ -z "${release_json}" ]; then
            echo "Could not locate draft release for tag ${RELEASE_TAG}." >&2
            exit 1
          fi

          echo "id=$(echo "${release_json}" | jq -r .id)" >> "${GITHUB_OUTPUT}"

  build-macos:
    name: Build macOS (ARM64)
    needs: prepare
    if: inputs.include_macos == true
    runs-on: macos-latest
    timeout-minutes: 150
    steps:
      - name: Checkout alexandria
        uses: actions/checkout@v5
        with:
          path: alexandria
          ref: ${{ env.BUILD_REF }}

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v5
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.89.0

      - name: Add ARM64 Apple target
        run: rustup target add aarch64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: alexandria/package-lock.json

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: alexandria/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Sync release version from tag
        working-directory: alexandria
        run: node scripts/prepare-tauri-config.mjs sync-version "${RELEASE_TAG}"

      - name: Prepare unsigned desktop config
        if: inputs.mode == 'validate' || inputs.sign_updater != true
        working-directory: alexandria
        run: node scripts/prepare-tauri-config.mjs desktop-validation

      - name: Import Apple Certificate
        if: inputs.mode == 'release' && inputs.sign_updater == true
        working-directory: alexandria
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings build.keychain
          rm certificate.p12

      - name: Install FFmpeg and autotools
        run: brew install cmake ffmpeg libtool automake autoconf

      - name: Write Apple API Key
        if: inputs.mode == 'release' && inputs.sign_updater == true
        run: echo "${{ secrets.APPLE_API_KEY_CONTENT }}" > $RUNNER_TEMP/AuthKey.p8

      - name: Build macOS validation artifacts
        if: inputs.mode == 'validate'
        uses: tauri-apps/tauri-action@v0
        env:
          PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig
          LIBRARY_PATH: /opt/homebrew/lib
        with:
          projectPath: alexandria
          args: --target aarch64-apple-darwin --bundles dmg --config src-tauri/tauri.desktop.macos.conf.json
          includeUpdaterJson: false

      - name: Build unsigned macOS release
        if: inputs.mode == 'release' && inputs.sign_updater != true
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig
          LIBRARY_PATH: /opt/homebrew/lib
        with:
          projectPath: alexandria
          releaseId: ${{ needs.prepare.outputs.release_id }}
          args: --target aarch64-apple-darwin --bundles dmg --config src-tauri/tauri.desktop.macos.conf.json
          includeUpdaterJson: false

      - name: Build signed macOS release
        if: inputs.mode == 'release' && inputs.sign_updater == true
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ format('{0}/AuthKey.p8', runner.temp) }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig
          LIBRARY_PATH: /opt/homebrew/lib
        with:
          projectPath: alexandria
          releaseId: ${{ needs.prepare.outputs.release_id }}
          args: --target aarch64-apple-darwin --bundles dmg --config src-tauri/tauri.desktop.macos.conf.json
          includeUpdaterJson: false

      - name: Rename macOS release assets
        if: inputs.mode == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          RELEASE_ID="${{ needs.prepare.outputs.release_id }}"
          rename_asset() {
            local old_pattern="$1" new_name="$2"
            local assets
            assets=$(gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" --jq '.[] | "\(.id) \(.name)"')
            echo "$assets" | while read -r id name; do
              if [ "$name" = "$new_name" ]; then
                gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/$id" --silent || true
              fi
            done
            echo "$assets" | while read -r id name; do
              case "$name" in $old_pattern) gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/assets/$id" -f name="$new_name" --silent ;; esac
            done
          }
          rename_asset '*_aarch64.dmg' "Alexandria-${VERSION}-macOS-Apple-Silicon.dmg"
          rename_asset '*_aarch64.dmg.sig' "Alexandria-${VERSION}-macOS-Apple-Silicon.dmg.sig"

      - name: Collect macOS artifacts
        id: macos-artifacts
        run: |
          set -euo pipefail
          ARTIFACT_DIR="$RUNNER_TEMP/desktop-macos-arm64"
          mkdir -p "$ARTIFACT_DIR"
          for candidate in \
            "alexandria/target/aarch64-apple-darwin/release/bundle/dmg" \
            "alexandria/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg"; do
            if [ -d "$candidate" ]; then
              find "$candidate" -type f -exec cp {} "$ARTIFACT_DIR"/ \;
            fi
          done
          if [ -z "$(find "$ARTIFACT_DIR" -type f -print -quit)" ]; then
            echo "No macOS artifacts were produced." >&2
            exit 1
          fi
          # Rename for user-friendly download names
          VERSION="${RELEASE_TAG#v}"
          for f in "$ARTIFACT_DIR"/*.dmg; do
            [ -f "$f" ] && mv "$f" "$ARTIFACT_DIR/Alexandria-${VERSION}-macOS-Apple-Silicon.dmg"
          done
          for f in "$ARTIFACT_DIR"/*.dmg.sig; do
            [ -f "$f" ] && mv "$f" "$ARTIFACT_DIR/Alexandria-${VERSION}-macOS-Apple-Silicon.dmg.sig"
          done
          echo "artifact_dir=$ARTIFACT_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload macOS validation artifacts
        if: inputs.mode == 'validate'
        uses: actions/upload-artifact@v6
        with:
          name: desktop-macos-arm64
          path: ${{ steps.macos-artifacts.outputs.artifact_dir }}/*
          if-no-files-found: error

      - name: Upload macOS release artifacts for finalization
        if: inputs.mode == 'release' && inputs.sign_updater == true
        uses: actions/upload-artifact@v6
        with:
          name: release-macos-arm64
          path: ${{ steps.macos-artifacts.outputs.artifact_dir }}/*
          if-no-files-found: error

  build-linux-x64:
    name: Build Linux (x86_64)
    needs: prepare
    if: inputs.include_linux == true
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      RUSTUP_HOME: /mnt/rustup
      CARGO_HOME: /mnt/cargo
      CARGO_TARGET_DIR: /mnt/target
      TMPDIR: /mnt/tmp
    steps:
      - name: Free Linux disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Prepare /mnt directories
        run: |
          sudo mkdir -p /mnt/rustup /mnt/cargo /mnt/target /mnt/tmp
          sudo chown -R "$(id -un):$(id -gn)" /mnt/rustup /mnt/cargo /mnt/target /mnt/tmp
          chmod 1777 /mnt/tmp

      - name: Install Linux system dependencies
        run: |
          sudo add-apt-repository universe -y
          sudo env TMPDIR="$TMPDIR" apt-get update
          sudo env TMPDIR="$TMPDIR" apt-get install -y --no-install-recommends \
            cmake \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            nasm \
            libclang-dev \
            pkg-config \
            libv4l-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libdbus-1-dev \
            libopus-dev \
            libssl-dev \
            libx264-dev \
            libva-dev \
            libgbm-dev \
            libdrm-dev \
            libvdpau-dev

      - name: Checkout alexandria
        uses: actions/checkout@v5
        with:
          path: alexandria
          ref: ${{ env.BUILD_REF }}

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v5
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.89.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: alexandria/package-lock.json

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: alexandria/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Sync release version from tag
        working-directory: alexandria
        run: node scripts/prepare-tauri-config.mjs sync-version "${RELEASE_TAG}"

      - name: Prepare unsigned desktop config
        if: inputs.mode == 'validate' || inputs.sign_updater != true
        working-directory: alexandria
        run: node scripts/prepare-tauri-config.mjs desktop-validation

      - name: Build Linux validation artifacts
        if: inputs.mode == 'validate'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: alexandria
          args: --bundles appimage,deb --config src-tauri/tauri.desktop.linux.conf.json
          includeUpdaterJson: false

      - name: Build Linux release
        if: inputs.mode == 'release'
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ inputs.sign_updater && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ inputs.sign_updater && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: alexandria
          releaseId: ${{ needs.prepare.outputs.release_id }}
          args: --bundles appimage,deb --config src-tauri/tauri.desktop.linux.conf.json
          includeUpdaterJson: false

      - name: Rename Linux x64 release assets
        if: inputs.mode == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          RELEASE_ID="${{ needs.prepare.outputs.release_id }}"
          rename_asset() {
            local old_pattern="$1" new_name="$2"
            local assets
            assets=$(gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" --jq '.[] | "\(.id) \(.name)"')
            echo "$assets" | while read -r id name; do
              if [ "$name" = "$new_name" ]; then
                gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/$id" --silent || true
              fi
            done
            echo "$assets" | while read -r id name; do
              case "$name" in $old_pattern) gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/assets/$id" -f name="$new_name" --silent ;; esac
            done
          }
          rename_asset '*_amd64.AppImage' "Alexandria-${VERSION}-Linux-x86_64.AppImage"
          rename_asset '*_amd64.AppImage.sig' "Alexandria-${VERSION}-Linux-x86_64.AppImage.sig"
          rename_asset '*_amd64.deb' "Alexandria-${VERSION}-Linux-x86_64.deb"
          rename_asset '*_amd64.deb.sig' "Alexandria-${VERSION}-Linux-x86_64.deb.sig"

      - name: Collect and rename Linux x64 artifacts
        id: linux-x64-artifacts
        run: |
          set -euo pipefail
          ARTIFACT_DIR="$RUNNER_TEMP/desktop-linux-x86_64"
          mkdir -p "$ARTIFACT_DIR"
          VERSION="${RELEASE_TAG#v}"
          for f in /mnt/target/release/bundle/appimage/*_amd64.AppImage; do
            [ -f "$f" ] && cp "$f" "$ARTIFACT_DIR/Alexandria-${VERSION}-Linux-x86_64.AppImage"
          done
          for f in /mnt/target/release/bundle/appimage/*_amd64.AppImage.sig; do
            [ -f "$f" ] && cp "$f" "$ARTIFACT_DIR/Alexandria-${VERSION}-Linux-x86_64.AppImage.sig"
          done
          for f in /mnt/target/release/bundle/deb/*_amd64.deb; do
            [ -f "$f" ] && cp "$f" "$ARTIFACT_DIR/Alexandria-${VERSION}-Linux-x86_64.deb"
          done
          for f in /mnt/target/release/bundle/deb/*_amd64.deb.sig; do
            [ -f "$f" ] && cp "$f" "$ARTIFACT_DIR/Alexandria-${VERSION}-Linux-x86_64.deb.sig"
          done
          echo "artifact_dir=$ARTIFACT_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload Linux validation artifacts
        if: inputs.mode == 'validate'
        uses: actions/upload-artifact@v6
        with:
          name: desktop-linux-x86_64
          path: ${{ steps.linux-x64-artifacts.outputs.artifact_dir }}/*
          if-no-files-found: error

      - name: Upload Linux release artifacts for finalization
        if: inputs.mode == 'release' && inputs.sign_updater == true
        uses: actions/upload-artifact@v6
        with:
          name: release-linux-x86_64
          path: ${{ steps.linux-x64-artifacts.outputs.artifact_dir }}/*
          if-no-files-found: error

  build-linux-arm64:
    name: Build Linux (ARM64)
    needs: prepare
    if: >-
      inputs.include_linux == true &&
      (github.event.repository.visibility == 'public' ||
      inputs.include_linux_arm64 == true)
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 90
    env:
      RUSTUP_HOME: /mnt/rustup
      CARGO_HOME: /mnt/cargo
      CARGO_TARGET_DIR: /mnt/target
      TMPDIR: /mnt/tmp
    steps:
      - name: Free Linux disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Prepare /mnt directories
        run: |
          sudo mkdir -p /mnt/rustup /mnt/cargo /mnt/target /mnt/tmp
          sudo chown -R "$(id -un):$(id -gn)" /mnt/rustup /mnt/cargo /mnt/target /mnt/tmp
          chmod 1777 /mnt/tmp

      - name: Install Linux system dependencies
        run: |
          sudo add-apt-repository universe -y
          sudo env TMPDIR="$TMPDIR" apt-get update
          sudo env TMPDIR="$TMPDIR" apt-get install -y --no-install-recommends \
            cmake \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            nasm \
            libclang-dev \
            pkg-config \
            libv4l-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libdbus-1-dev \
            libopus-dev \
            libssl-dev \
            libx264-dev \
            libva-dev \
            libgbm-dev \
            libdrm-dev \
            libvdpau-dev

      - name: Checkout alexandria
        uses: actions/checkout@v5
        with:
          path: alexandria
          ref: ${{ env.BUILD_REF }}

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v5
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.89.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: alexandria/package-lock.json

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: alexandria/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Sync release version from tag
        working-directory: alexandria
        run: node scripts/prepare-tauri-config.mjs sync-version "${RELEASE_TAG}"

      - name: Prepare unsigned desktop config
        if: inputs.mode == 'validate' || inputs.sign_updater != true
        working-directory: alexandria
        run: node scripts/prepare-tauri-config.mjs desktop-validation

      - name: Build Linux ARM64 validation artifacts
        if: inputs.mode == 'validate'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: alexandria
          args: --bundles appimage,deb --config src-tauri/tauri.desktop.linux.conf.json
          includeUpdaterJson: false

      - name: Build Linux ARM64 release
        if: inputs.mode == 'release'
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ inputs.sign_updater && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ inputs.sign_updater && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: alexandria
          releaseId: ${{ needs.prepare.outputs.release_id }}
          args: --bundles appimage,deb --config src-tauri/tauri.desktop.linux.conf.json
          includeUpdaterJson: false

      - name: Rename Linux ARM64 release assets
        if: inputs.mode == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          RELEASE_ID="${{ needs.prepare.outputs.release_id }}"
          rename_asset() {
            local old_pattern="$1" new_name="$2"
            local assets
            assets=$(gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" --jq '.[] | "\(.id) \(.name)"')
            echo "$assets" | while read -r id name; do
              if [ "$name" = "$new_name" ]; then
                gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/$id" --silent || true
              fi
            done
            echo "$assets" | while read -r id name; do
              case "$name" in $old_pattern) gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/assets/$id" -f name="$new_name" --silent ;; esac
            done
          }
          rename_asset '*_arm64.AppImage' "Alexandria-${VERSION}-Linux-ARM64.AppImage"
          rename_asset '*_arm64.AppImage.sig' "Alexandria-${VERSION}-Linux-ARM64.AppImage.sig"
          rename_asset '*_arm64.deb' "Alexandria-${VERSION}-Linux-ARM64.deb"
          rename_asset '*_arm64.deb.sig' "Alexandria-${VERSION}-Linux-ARM64.deb.sig"

      - name: Collect and rename Linux ARM64 artifacts
        id: linux-arm64-artifacts
        run: |
          set -euo pipefail
          ARTIFACT_DIR="$RUNNER_TEMP/desktop-linux-arm64"
          mkdir -p "$ARTIFACT_DIR"
          VERSION="${RELEASE_TAG#v}"
          for f in /mnt/target/release/bundle/appimage/*_arm64.AppImage; do
            [ -f "$f" ] && cp "$f" "$ARTIFACT_DIR/Alexandria-${VERSION}-Linux-ARM64.AppImage"
          done
          for f in /mnt/target/release/bundle/appimage/*_arm64.AppImage.sig; do
            [ -f "$f" ] && cp "$f" "$ARTIFACT_DIR/Alexandria-${VERSION}-Linux-ARM64.AppImage.sig"
          done
          for f in /mnt/target/release/bundle/deb/*_arm64.deb; do
            [ -f "$f" ] && cp "$f" "$ARTIFACT_DIR/Alexandria-${VERSION}-Linux-ARM64.deb"
          done
          for f in /mnt/target/release/bundle/deb/*_arm64.deb.sig; do
            [ -f "$f" ] && cp "$f" "$ARTIFACT_DIR/Alexandria-${VERSION}-Linux-ARM64.deb.sig"
          done
          echo "artifact_dir=$ARTIFACT_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload Linux ARM64 validation artifacts
        if: inputs.mode == 'validate'
        uses: actions/upload-artifact@v6
        with:
          name: desktop-linux-arm64
          path: ${{ steps.linux-arm64-artifacts.outputs.artifact_dir }}/*
          if-no-files-found: error

      - name: Upload Linux ARM64 release artifacts for finalization
        if: inputs.mode == 'release' && inputs.sign_updater == true
        uses: actions/upload-artifact@v6
        with:
          name: release-linux-arm64
          path: ${{ steps.linux-arm64-artifacts.outputs.artifact_dir }}/*
          if-no-files-found: error

  build-windows:
    name: Build Windows (x86_64)
    needs: prepare
    if: inputs.include_windows == true
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      HAS_WINDOWS_CERT: ${{ secrets.WINDOWS_CERTIFICATE != '' }}
    steps:
      - name: Checkout alexandria
        uses: actions/checkout@v5
        with:
          path: alexandria
          ref: ${{ env.BUILD_REF }}

      - name: Checkout iroh-live-patched
        uses: actions/checkout@v5
        with:
          repository: ifftu-dev/iroh-live
          path: iroh-live-patched
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Download pre-built FFmpeg for Windows
        id: windows-ffmpeg
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl-shared.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\ffmpeg.zip" -DestinationPath "$env:RUNNER_TEMP\ffmpeg-extracted"
          $ffmpegDir = (Get-ChildItem "$env:RUNNER_TEMP\ffmpeg-extracted" -Directory | Select-Object -First 1).FullName
          Add-Content -Path $env:GITHUB_OUTPUT -Value "root_dir=$ffmpegDir"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "bin_dir=$ffmpegDir\bin"
          echo "FFMPEG_DIR=$ffmpegDir" >> $env:GITHUB_ENV
          echo "$ffmpegDir\bin" >> $env:GITHUB_PATH

      - name: Setup Rust 1.83.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.89.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: alexandria/package-lock.json

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: alexandria/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: alexandria
        run: npm ci

      - name: Sync release version from tag
        working-directory: alexandria
        shell: pwsh
        run: node scripts/prepare-tauri-config.mjs sync-version "${env:RELEASE_TAG}"

      - name: Prepare unsigned desktop config
        if: inputs.mode == 'validate' || inputs.sign_updater != true
        working-directory: alexandria
        shell: pwsh
        run: node scripts/prepare-tauri-config.mjs desktop-validation

      - name: Install autotools via MSYS2
        shell: pwsh
        run: |
          $bash = 'C:\msys64\usr\bin\bash.exe'
          $msysUsrBin = 'C:\msys64\usr\bin'
          if (-not (Test-Path $bash)) {
            throw "MSYS2 bash was not found at $bash"
          }
          & $bash -lc "pacman -Sy --noconfirm --needed autoconf automake libtool make"
          & $bash -lc "command -v libtoolize && libtoolize --version | head -n 1"
          Add-Content -Path $env:GITHUB_ENV -Value "MSYS2_BASH_EXE=$bash"
          Add-Content -Path $env:GITHUB_ENV -Value "MSYS2_USR_BIN=$msysUsrBin"

      - name: Prepare Windows build environment
        id: windows-build-env
        shell: pwsh
        run: |
          $strawberryPerlDir = 'C:\Strawberry\perl\bin'
          $strawberryCDir = 'C:\Strawberry\c\bin'
          $llvmBinDirs = @()
          if ($env:LLVMInstallDir) {
            if (Test-Path (Join-Path $env:LLVMInstallDir 'clang.exe')) {
              $llvmBinDirs += $env:LLVMInstallDir
            } else {
              $llvmBin = Join-Path $env:LLVMInstallDir 'bin'
              if (Test-Path $llvmBin) {
                $llvmBinDirs += $llvmBin
              }
            }
          }
          $msvcBinDir = $null
          if ($env:VCToolsInstallDir) {
            $candidate = Join-Path $env:VCToolsInstallDir 'bin\Hostx64\x64'
            if (Test-Path $candidate) {
              $msvcBinDir = $candidate
            }
            $llvmFromVs = Join-Path (Split-Path (Split-Path $env:VCToolsInstallDir -Parent) -Parent) 'Llvm\x64\bin'
            if (Test-Path $llvmFromVs) {
              $llvmBinDirs += $llvmFromVs
            }
          }
          if (Test-Path 'C:\Program Files\LLVM\bin') {
            $llvmBinDirs += 'C:\Program Files\LLVM\bin'
          }
          $sdkBinDirs = @()
          foreach ($sdkVar in @('WindowsSdkVerBinPath', 'WindowsSdkBinPath')) {
            $sdkRoot = (Get-Item -Path "Env:$sdkVar" -ErrorAction SilentlyContinue).Value
            if (-not $sdkRoot) {
              continue
            }
            $sdkX64 = Join-Path $sdkRoot 'x64'
            if (Test-Path $sdkX64) {
              $sdkBinDirs += $sdkX64
            } elseif (Test-Path $sdkRoot) {
              $sdkBinDirs += $sdkRoot
            }
          }
          $pathEntries = @(
            $strawberryPerlDir
          ) + $llvmBinDirs + @(
            $strawberryCDir
            $msvcBinDir
          ) + $sdkBinDirs + @(
            '${{ steps.windows-ffmpeg.outputs.bin_dir }}'
          ) + ($env:Path -split ';' | Where-Object { $_ })
          $effectivePath = ($pathEntries | Select-Object -Unique) -join ';'
          Add-Content -Path $env:GITHUB_OUTPUT -Value "path=$effectivePath"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "ffmpeg_dir=${{ steps.windows-ffmpeg.outputs.root_dir }}"
          Get-Command cargo
          Get-Command node
          Get-Command perl
          Get-Command clang.exe
          Get-Command clang++.exe
          Get-Command cl.exe
          Get-Command link.exe
          Get-Command lld-link.exe
          Get-Command lib.exe

      - name: Copy FFmpeg DLLs for bundling
        shell: pwsh
        run: |
          $ffmpegBin = '${{ steps.windows-ffmpeg.outputs.bin_dir }}'
          $dllDir = 'alexandria\src-tauri\ffmpeg-dlls'
          New-Item -ItemType Directory -Path $dllDir -Force | Out-Null
          $dlls = Get-ChildItem -Path $ffmpegBin -Filter '*.dll'
          foreach ($dll in $dlls) {
            Copy-Item $dll.FullName -Destination $dllDir
            Write-Host "  Bundling $($dll.Name)"
          }
          Write-Host "Copied $($dlls.Count) FFmpeg DLLs to $dllDir"
          # Verify files exist
          Get-ChildItem -Path $dllDir | ForEach-Object { Write-Host "  Verified: $($_.Name) ($($_.Length) bytes)" }
          # Show merged config for debugging
          Write-Host "Windows config:"
          Get-Content 'alexandria\src-tauri\tauri.desktop.windows.conf.json'

      - name: Build Windows validation artifacts
        if: inputs.mode == 'validate'
        uses: tauri-apps/tauri-action@v0
        env:
          PATH: ${{ steps.windows-build-env.outputs.path }}
          FFMPEG_DIR: ${{ steps.windows-build-env.outputs.ffmpeg_dir }}
          MSYS2_BASH_EXE: ${{ env.MSYS2_BASH_EXE }}
          MSYS2_USR_BIN: ${{ env.MSYS2_USR_BIN }}
          PERL: C:\Strawberry\perl\bin\perl.exe
        with:
          projectPath: alexandria
          args: --bundles nsis --config src-tauri/tauri.desktop.windows.conf.json
          includeUpdaterJson: false

      - name: Build Windows release
        if: inputs.mode == 'release'
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ inputs.sign_updater && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ inputs.sign_updater && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PATH: ${{ steps.windows-build-env.outputs.path }}
          FFMPEG_DIR: ${{ steps.windows-build-env.outputs.ffmpeg_dir }}
          MSYS2_BASH_EXE: ${{ env.MSYS2_BASH_EXE }}
          MSYS2_USR_BIN: ${{ env.MSYS2_USR_BIN }}
          PERL: C:\Strawberry\perl\bin\perl.exe
        with:
          projectPath: alexandria
          releaseId: ${{ needs.prepare.outputs.release_id }}
          args: --bundles nsis --config src-tauri/tauri.desktop.windows.conf.json
          includeUpdaterJson: false

      - name: Rename Windows release assets
        if: inputs.mode == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          RELEASE_ID="${{ needs.prepare.outputs.release_id }}"
          rename_asset() {
            local old_pattern="$1" new_name="$2"
            local assets
            assets=$(gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" --jq '.[] | "\(.id) \(.name)"')
            # Delete any existing asset with the target name (from a previous run)
            echo "$assets" | while read -r id name; do
              if [ "$name" = "$new_name" ]; then
                gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/$id" --silent || true
              fi
            done
            # Rename the Tauri-named asset
            echo "$assets" | while read -r id name; do
              case "$name" in $old_pattern) gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/assets/$id" -f name="$new_name" --silent ;; esac
            done
          }
          rename_asset '*_x64-setup.exe' "Alexandria-${VERSION}-Windows-x64-Setup.exe"
          rename_asset '*_x64-setup.exe.sig' "Alexandria-${VERSION}-Windows-x64-Setup.exe.sig"

      - name: Collect Windows artifacts
        id: windows-artifacts
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:RUNNER_TEMP 'desktop-windows-x86_64'
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null
          $bundleCandidates = @(
            'alexandria\target\release\bundle'
            'alexandria\src-tauri\target\release\bundle'
          )
          $bundleRoot = $null
          foreach ($candidate in $bundleCandidates) {
            if (Test-Path $candidate) {
              $bundleRoot = (Resolve-Path $candidate).Path
              break
            }
          }
          if (-not $bundleRoot) {
            throw "No Windows bundle directory was found. Checked: $($bundleCandidates -join ', ')"
          }
          $files = Get-ChildItem -Path $bundleRoot -Recurse -File |
            Where-Object { $_.Extension -in @('.exe', '.msi', '.zip', '.sig') }
          if (-not $files) {
            throw "No Windows artifacts were produced under $bundleRoot."
          }
          foreach ($file in $files) {
            Copy-Item -Path $file.FullName -Destination $artifactDir -Force
          }
          # Rename for user-friendly download names
          $version = $env:RELEASE_TAG -replace '^v', ''
          Get-ChildItem -Path $artifactDir -Filter '*_x64-setup.exe' | ForEach-Object {
            Rename-Item $_.FullName "Alexandria-${version}-Windows-x64-Setup.exe"
          }
          Get-ChildItem -Path $artifactDir -Filter '*_x64-setup.exe.sig' | ForEach-Object {
            Rename-Item $_.FullName "Alexandria-${version}-Windows-x64-Setup.exe.sig"
          }
          Get-ChildItem -Path $artifactDir -Filter '*_x64-setup.nsis.zip' | ForEach-Object {
            Rename-Item $_.FullName "Alexandria-${version}-Windows-x64-Setup.nsis.zip"
          }
          Get-ChildItem -Path $artifactDir -Filter '*_x64-setup.nsis.zip.sig' | ForEach-Object {
            Rename-Item $_.FullName "Alexandria-${version}-Windows-x64-Setup.nsis.zip.sig"
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "artifact_dir=$artifactDir"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "bundle_root=$bundleRoot"

      - name: Upload Windows validation artifacts
        if: inputs.mode == 'validate'
        uses: actions/upload-artifact@v6
        with:
          name: desktop-windows-x86_64
          path: ${{ steps.windows-artifacts.outputs.artifact_dir }}/*
          if-no-files-found: error

      - name: Sign Windows installer (Authenticode)
        if: inputs.mode == 'release' && env.HAS_WINDOWS_CERT == 'true'
        shell: powershell
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath = Join-Path $env:RUNNER_TEMP "certificate.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          $installers = Get-ChildItem `
            -Path (Join-Path '${{ steps.windows-artifacts.outputs.bundle_root }}' 'nsis') `
            -Filter "*_x64-setup.exe" -Recurse
          foreach ($installer in $installers) {
            & signtool sign `
              /fd SHA256 /td SHA256 `
              /tr http://timestamp.digicert.com `
              /f $certPath /p $env:WINDOWS_CERTIFICATE_PASSWORD `
              $installer.FullName
            Write-Host "Signed: $($installer.Name)"
          }
          Remove-Item -Force $certPath

      - name: Re-upload signed installer with friendly name
        if: inputs.mode == 'release' && env.HAS_WINDOWS_CERT == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          FRIENDLY_NAME="Alexandria-${VERSION}-Windows-x64-Setup.exe"
          # Copy signed exe from original location with friendly name
          cp alexandria/src-tauri/target/release/bundle/nsis/*_x64-setup.exe "/tmp/${FRIENDLY_NAME}"
          gh release upload "${RELEASE_TAG}" "/tmp/${FRIENDLY_NAME}" --clobber --repo "${GITHUB_REPOSITORY}"

      - name: Upload Windows release artifacts for finalization
        if: inputs.mode == 'release' && inputs.sign_updater == true
        uses: actions/upload-artifact@v6
        with:
          name: release-windows-x86_64
          path: ${{ steps.windows-artifacts.outputs.artifact_dir }}/*
          if-no-files-found: error

  finalize:
    name: Finalize desktop release
    needs:
      - prepare
      - build-macos
      - build-linux-x64
      - build-linux-arm64
      - build-windows
    runs-on: ubuntu-latest
    if: |
      inputs.mode == 'release' &&
      inputs.sign_updater == true &&
      !cancelled() &&
      (inputs.include_macos != true || needs.build-macos.result == 'success') &&
      (inputs.include_linux != true || needs.build-linux-x64.result == 'success') &&
      (inputs.include_windows != true || needs.build-windows.result == 'success')
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate latest.json for auto-updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_LINUX_ARM64_RESULT: ${{ needs.build-linux-arm64.result }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${RELEASE_TAG}"

          find_artifact() { find artifacts -name "$1" -type f 2>/dev/null | head -1; }

          MACOS_SIG_FILE=$(find_artifact "*macOS-Apple-Silicon.dmg.sig")
          LINUX_X64_SIG_FILE=$(find_artifact "*Linux-x86_64.AppImage.sig")
          WINDOWS_SIG_FILE=$(find_artifact "*Windows-x64-Setup.nsis.zip.sig")

          PLATFORMS="{}"
          PLATFORM_COUNT=0
          add_platform() {
            local key="$1" sig_file="$2"
            local sig pkg url
            sig=$(cat "$sig_file")
            pkg=$(basename "$sig_file" .sig)
            url="$BASE_URL/$pkg"
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg sig "$sig" --arg url "$url" \
              ".\"$key\" = {signature: \$sig, url: \$url}")
            PLATFORM_COUNT=$((PLATFORM_COUNT + 1))
          }

          if [ -n "$MACOS_SIG_FILE" ]; then
            add_platform "darwin-aarch64" "$MACOS_SIG_FILE"
          else
            echo "WARNING: macOS .dmg.sig not found — skipping darwin-aarch64 in latest.json"
          fi

          if [ -n "$LINUX_X64_SIG_FILE" ]; then
            add_platform "linux-x86_64" "$LINUX_X64_SIG_FILE"
          else
            echo "WARNING: Linux x64 .AppImage.sig not found — skipping linux-x86_64 in latest.json"
          fi

          if [ -n "$WINDOWS_SIG_FILE" ]; then
            add_platform "windows-x86_64" "$WINDOWS_SIG_FILE"
          else
            echo "WARNING: Windows .nsis.zip.sig not found — skipping windows-x86_64 in latest.json"
          fi

          if [ "$BUILD_LINUX_ARM64_RESULT" = "success" ]; then
            LINUX_ARM64_SIG_FILE=$(find_artifact "*Linux-ARM64.AppImage.sig")
            if [ -n "$LINUX_ARM64_SIG_FILE" ]; then
              add_platform "linux-aarch64" "$LINUX_ARM64_SIG_FILE"
            fi
          fi

          if [ "$PLATFORM_COUNT" -eq 0 ]; then
            echo "WARNING: No platform signatures found — skipping latest.json generation"
            echo '{}' > latest.json
          else
            echo "Generating latest.json with $PLATFORM_COUNT platform(s)"
          fi

          VERSION="${RELEASE_TAG#v}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq -n \
            --arg version "$VERSION" \
            --arg notes "" \
            --arg pub_date "$TIMESTAMP" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > latest.json

      - name: Upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${RELEASE_TAG}" latest.json --clobber --repo "${GITHUB_REPOSITORY}"
