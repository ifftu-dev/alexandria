name: Verify ASC API Key (temp)

# Throwaway diagnostic: signs an App Store Connect API JWT with the key and
# probes what it can access — auth validity, whether the App ID
# org.alexandria.node is registered, and what profiles/certs exist. This
# reveals the key's effective signing permission (App Manager/Admin can list
# and manage certs+profiles; a Developer-role key gets 403 FORBIDDEN).
# Prints only identifiers/names — no secret material. Delete after use.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Query App Store Connect API
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          python3 -m pip install --quiet pyjwt cryptography requests
          python3 - <<'PY'
          import os, time, json, jwt, requests
          kid=os.environ["APPLE_API_KEY_ID"]; iss=os.environ["APPLE_API_ISSUER_ID"]; p8=os.environ["APPLE_API_KEY_P8"]
          tok=jwt.encode({"iss":iss,"iat":int(time.time()),"exp":int(time.time())+600,"aud":"appstoreconnect-v1"},
                         p8, algorithm="ES256", headers={"kid":kid,"typ":"JWT"})
          H={"Authorization":f"Bearer {tok}"}
          B="https://api.appstoreconnect.apple.com/v1"
          def get(path):
              r=requests.get(B+path, headers=H, timeout=30); return r.status_code, r
          print("="*55)
          sc,r=get("/apps?limit=1")
          print(f"AUTH check GET /apps -> HTTP {sc}")
          if sc==401: print("  -> 401 UNAUTHORIZED: key id / issuer / .p8 wrong or JWT invalid");
          if sc==403: print("  -> 403 FORBIDDEN: key role too low for this resource")
          print("="*55)
          sc,r=get("/bundleIds?filter[identifier]=org.alexandria.node&limit=200")
          print(f"App ID org.alexandria.node: GET /bundleIds -> HTTP {sc}")
          if sc==200:
              d=r.json().get("data",[])
              if d:
                  for b in d: print(f"  FOUND: {b['attributes'].get('identifier')}  (name={b['attributes'].get('name')}, platform={b['attributes'].get('platform')})")
              else:
                  print("  NOT REGISTERED (no bundleId matches org.alexandria.node) <-- likely the blocker")
          else:
              print(f"  cannot query bundleIds (HTTP {sc}) -> key lacks access")
          print("="*55)
          sc,r=get("/profiles?limit=200&include=bundleId")
          print(f"Provisioning profiles: GET /profiles -> HTTP {sc}")
          if sc==200:
              d=r.json().get("data",[])
              print(f"  {len(d)} profile(s):")
              for p in d:
                  a=p["attributes"]; print(f"    - {a.get('name')}  [{a.get('profileType')}, state={a.get('profileState')}]")
              if not any('org.alexandria.node' in json.dumps(p) for p in d):
                  print("  (none obviously tied to org.alexandria.node)")
          elif sc==403:
              print("  403 FORBIDDEN listing profiles -> key role too low (NOT App Manager/Admin for signing)")
          print("="*55)
          sc,r=get("/certificates?limit=200")
          print(f"Certificates: GET /certificates -> HTTP {sc}")
          if sc==200:
              for c in r.json().get("data",[]):
                  a=c["attributes"]; print(f"    - {a.get('certificateType')}: {a.get('displayName')} (exp {a.get('expirationDate')})")
          elif sc==403:
              print("  403 FORBIDDEN listing certificates -> key role too low")
          print("="*55)
          print("VERDICT:")
          print(" - AUTH 200 + profiles/certs listed  => key has App Manager/Admin signing access.")
          print(" - Any 403                            => key role insufficient (need App Manager/Admin).")
          print(" - bundleId NOT REGISTERED            => register org.alexandria.node before signing can work.")
          PY
